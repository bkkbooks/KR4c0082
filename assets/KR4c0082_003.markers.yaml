  - {type: variant, offset: 486, length: 555, content: 天時亢旱經四十餘日不雨監司并本州縣官躬詣祠下精專祈禱不數日雨澤沾足乞申監司保奏再加爵號本司㝷行下鄰近南劒州體䆒續據本州申差委劒浦縣主簿張基前來體䆒得本廟委有靈迹本司遂差委建州節度推官周埅躬親前去覆行按實委的靈跡於民本司保明詣實本部尋下太常寺勘㑹去後據本寺狀今來福建轉運司保奏到建州建安縣棃山澤民廟忠惠公祈禱靈應合於忠惠公上増加二字本部今欲依本寺申到事理施行伏候指揮牒奉勑建州建安縣棃山澤民廟忠惠公農夫望歳甘澤或愆嬰兒戯兵虚𦦨來嚮荷威靈之助順沛膏澤以來蘇匪人能爲繄神是頼増崇四字之公號用慰一方之民心尚監竉褒永垂佑享宜特封靈顯忠恵公牒至准勑故牒紹興六年九月日牒慶元中封王號勑王髙爵也河江淮濟經緯四方乃克保有兹爵血食進攘寵登誠尊且榮矣建寧府建安縣靈濟王仕於前朝愛利兹土歷年既乆不忘其民而惠濟之有禱輙應赫然如初幽冥死生母貳爾心古之豪傑也聦明而善應羙孰加焉増煥新號用彰靈休其保我民尚監兹寵可特封靈佑善應王奉勑如牒到奉行慶元六年七月二十六日下嘉泰中封王號勑生而爲惠大芘我民殁則宣靈克祀兹土未泯桐郷之愛有赫羅池之居相望千年併恊二羙建寧府建安縣棃山澤民廟靈佑善應王正直是與馨所依功昭仁元事恊封典發山川而出雲氣兹奠測於爲神雜看𬞞兮進侯當府載新於美報閩區之左建水之陽靈棲有光朕命惟允可特封靈佑善應廣濟王奉勑如牒到奉行嘉泰二年六月二, WYG: ''}
