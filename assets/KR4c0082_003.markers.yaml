  - {type: variant, offset: 0, length: 3, content: 附録古, WYG: 唐李頻撰湖口送友人中流欲暮見湘煙葦岸無窮接楚田一作天去鴈逺衝雲夢澤一作雪離人獨上洞庭船風波盡日依山轉星漢通宵向水連零落梅花過殘臘故園歸一作去醉及一作去又新年鄂州頭陀寺上方髙寺上方無不見天涯行客思迢迢西江帆過一作挂東風急夏口城衝一作銜楚塞遥沙渚漁歸多濕網桑林蠶後盡空條感時嘆物尋僧話惟一作誰向禪心得寂寥寄逺槐欲成隂分袂時君期十日復金扉槐}
