front:
  text: 附録古今碑記詩序紹興五年碑忠惠公靈應昭格血食梨山廟逮今數百年建人奉祀甚嚴前此郡將監司上其狀既賜廟號屢進封爵功德昭昭在人耳目其名氏宜不可掩然者然歷世浸久庸人續出臆見以亂其真按今廟碑且云李昭度意以為宗室宰相李回位髙名著昭度其字也遂竊取為神且誣之何以為政考之唐史昭度未嘗仕閩中不知其説何據其然謹按文藝傳李頻字德新睦州夀昌人少秀悟長廬西山博覽善風韻尤長於詩與里人方干為詩友士多歸重大中八年擢進士第調袐書郎為南陵簿遷武功令盡條宿惡請於尹殺之縣大治歲飢發廥庸民浚渠溉田榖大稔懿宗嘉之擢侍御史遷都官貟外郎表求建州刺史既至以禮法繩下宣布條教時多盜建賴以安後以病殁父老扶柩歸葬永樂州為立庿梨山歲祀之史氏載其出處如是之詳廟貌儼然凛凛猶有生氣凡雨暘不時禱之必應然則李公生惠斯民而死能福之食民之祭傳於信史而流俗之妄不為是正吏則有罪輒書大略揭示邦人俾知所祀之本無為神羞焉紹興五年七月𥘉六日左朝請郎權發遣福建路轉運判官公事鄭士彥題紹興中封公號禮部狀凖都省批送下福建路轉運司奏據建州并建安縣申據在城士庶父老吳權等狀伏覩本州去城十五里有梨山澤民廟忠惠公顯靈凡有水旱一方之民逺近祈禱無不感應兼自今年五月以來天時亢旱經四十餘日不雨監司并本州縣官躬詣祠下精專祈禱不數日雨澤沾足乞申監司保奏再加爵號本司尋行下鄰近南劒州體究續據本州申差委劒浦縣主簿張基前來體究得本廟委有靈迹本司遂差委建州節度推官周埅躬親前去覆行按實委的靈迹於民本司保明詣實本部尋下太常寺勘會去後據本寺狀今來福建轉運司保奏到建州建安縣梨山澤民廟忠惠公祈禱靈應合於忠惠公上增加二字本部今欲依本寺申到事理施行伏候指揮牒奉勑建州建安縣梨山澤民廟忠惠公農夫望歲甘澤或愆嬰兒戲兵虛𦦨來嚮荷威靈之助順沛膏澤以來蘇匪人能為繄神是賴增崇四字之公號用慰一方之民心尚監竉褒永垂佑享宜特封靈顯忠惠公牒至準勑故牒紹興六年九月日牒慶元中封王號勑王髙爵也河江淮濟經緯四方乃克保有兹爵血食進攘寵登誠尊且榮矣建寧府建安縣靈濟王仕於前朝愛利兹土歷年既久不忘其民而惠濟之有禱輒應赫然如初幽冥死生母二爾心古之豪傑也聰明而善應美孰加焉增煥新號用彰靈休其保我民尚監兹寵可特封靈佑善應王奉勑如牒到奉行慶元六年七月二十六日下嘉泰中封王號勑生而為惠大芘我民殁則宣靈克祀兹土未泯桐鄉之愛有赫羅池之居相望千年併協二美建寧府建安縣梨山澤民廟靈佑善應王正直是與馨所依功昭仁元事協封典發山川而出雲氣兹奠測於為神雜看𬞞兮進侯當府載新於美報閩區之左建水之陽靈棲有光朕命惟允可特封靈佑善應廣濟王奉勑如牒到奉行嘉泰二年六月二十二月下嘉泰中立碑臣仰惟國家毖祀百神凡有功及人者率皆肆加爵秩以寵綏之蓋所以為氏也臣於嘉泰元年秋七月承乏漕事建寧乃置司之所切見梨嶽澤民廟靈佑善應王威神顯著芘佑千里雨賜之失時疾癘之或作若吏若民奔走祠下祈求禱禳應如影響去冬無雪今春霪潦涉夏以來又缺雨澤悉請于神旋踵昭格荷神之休念無以報剡章聞奏乞加封號上可其請二年夏六月有二日加廣濟共六字謹以告詞摹刻樂石以彰神之榮以侈上之恩俾吏民奉事益虔則神所以隂相此邦豈有終窮也哉朝散大夫直徽猷閣權發遣福建計度轉運使兼本路勸農事權安節拜手謹書于下方開禧中封王號勑朕對越百神以綏四海凡郡國之祀功利彰著必崇其爵列厚其禮文建寧府建安縣澤民廟靈佑善應廣濟王廟食一方感應如響王封之卑閲歲已多今年榖遊登邦人欣賴思若神貺逹于朕聞爰錫命書載衍加號惟神益昭其惠以慰元元則朕之報神寧有已哉可特封靈佑善應廣濟昭惠王奉勑如牒到奉行開禧三年十一月十九日下淳祐中封王號勑韓愈曰生能澤其民死能驚􅏒禍福之以食其土可為靈矣建寧府建安縣澤民廟靈佑福應昭惠王昔守建安適值盜攘治以禮法民遂安堵沒而見神於梨嶽廟祀至今禱祈響答贊書疊纍稱謂已極而士民尤合詞以請爰加徽號爾其顧歆益大隂隲以稱庶拳拳梨無之意可特更封靈佑福應威濟信順王奉勑如牒到奉行淳祐八年十一月十二日下淳祐中立碑臣切惟國朝恤民祀褒崇顯異第爵為王升華八字所以昭答扞民之功亦以權衡其馭世之意也不寧若是報無可報之功寵無可竉之典嚴魯經一字之重輕以寓其特書不一書之深意非天下之至神孰能與於此哉梨嶽澤民廟靈佑福應威濟信順王豐功偉績揭日掀天不特當時沾被教化去之數百載濡浹益深嘉熙間郡太守都承王野久旱閔雨應禱隨車嘗丐易號繼守祕撰黃壯猷閣學王遂待制王恢復溫前請未下淳祐七祀提舉趙師耕攝漕事以闔府士庶鄉貢進士雷叔似兩請漕貢進士趙時衢竒有遂請于朝巳酉春綸告請誕敷易封信順易日天之所助者順也人之所助者信也履信思順聖人猶以為大易之妙用豈輕卑之哉謹以詔詞鐫勒圖徽以彰肸蠁以恢前隸而邦人之矚望與臣之拳拳固不止此也奉議郎新權知邵武軍兼管內勸農事臣遊孝嚴拜手稽首謹書于下方有元重封梨嶽廟碑皇元混一區宇應天順民禋祀郊廟禮
