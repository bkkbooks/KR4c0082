  - {type: variant, offset: 158, length: 327, content: 少秀悟長廬西山博覧善風韻尤長於詩與里人方干爲詩友士多歸重大中八年擢進士第調袐書郎爲南陵簿遷武功令盡條宿惡請於尹殺之縣大治歲饑發廥庸民浚渠溉田榖大稔懿宗嘉之擢侍御史遷都官貟外郎表求建州刺史既至以禮法繩下宣布條教時多盗建頼以安後以病殁父老扶柩歸葬永樂州爲立庿棃山歲祀之史氏載其出處如是之詳廟貌儼然凛凛猶有生氣凡雨暘不時禱之必應然則李公生惠斯民而死能福之食民之祭傳於信史而流俗之妄不爲是正吏則有罪輙書大畧掲示邦人俾知所祀之本無爲神羞焉紹興五年七月𥘉六日左朝請郎權發遣福建路轉運判官公事鄭士彦題紹興中封公號禮部狀凖都省批送下福建路轉運司奏據建州并建安縣申據在城士庻父老呉權等狀伏覩本州去城十五里有棃山澤民廟忠惠公顯靈凡有水旱一方之民逺近祈禱無不感應兼自今年五月以, WYG: 别}
