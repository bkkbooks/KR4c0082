  - {type: variant, offset: 1103, length: 7, content: 棃嶽澤民廟靈佑, WYG: 沙鷗誰伴臨清景吟詩上郡樓送太學吳康仁及第南歸因為太學選志業徹春闈首領諸生出先登上第歸一榮猶未已具慶且應稀縦馬行青草臨歧脫白衣家遥楚國寄帆對漢山飛知已盈華省看君再發機陜州題河上亭岸擁洪流急亭開清興長當軒河草晚入坐水風涼獨鳥驚来客孤雲觸去檣秋聲和逺雨暮色帶微陽浪静澄窓影沙明發簟光逍遥毎盡日誰識愛滄浪留題姚氏山齋未厭棲林趣猶懐濟世才閒眠知道在髙步㑹時来露滴従添硯蟬吟便送杯亂書離縹帙迸筍出莓苔異果因僧摘幽窓為燕開春遊何處盡欲别㡬遲廻長安書懐投知已一作投邢員外所學近雕蟲知難謁至公徒隨衆人後擬老一生中間嵗家書到經荒世業空心懸滄海㫁一作夢與白雲通玉漏聲連北銀河氣極東闗門迢遞月禁苑寂寥鴻地廣身難束一作跼時平道獨窮蕭條苔長雨淅瀝葉危風久戀一作愧干朝客多慙别釣翁因依非不忝延薦況曽䝉與}
