  - {type: variant, offset: 1088, length: 1, content: 七, WYG: 風髙送鴈寒雨入停蟬此去勤書札時常中路傳江上寄山客山後與山前相思隔呌猿殘雲收樹末反照落江源苦雨秋濤長狂風野火飜朝來賣藥客遇我達君言送張郎中赴睦州青山復渌水想入富春西夾岸清猿去中流白日低美兼華省出榮共故鄉齊賤子遥攀送歸心逐馬啼送鄂渚韋尚書赴鎮夏口本吳頭重城據上遊戈舩轉江漢風}
  - {type: page-break, offset: 1088, content: '', id: KR4c0082_WYG_001-30a, image: WYG1083/WYG1083-0055a.png}
  - {type: variant, offset: 1090, length: 0, content: '', WYG: 宿汀洲執憲傾民望銜思赴主憂誰知舊寮屬攀餞淚仍流送崔侍御書記赴山北座主尚書招辟書記向邱門旌幢夾谷尊従來遊幕意此去并酬恩鴈呌嫌氷合驄嘶喜雪繁同為入室士不覺别銷魂入朝遇雪霜鬢持霜簡朝天向雪天玉階初辨色瓊樹乍相鮮宻翳空難曙盈徵瑞不愆誰為洛陽客是日更髙眠勉力日月不並照升沈俱有時自謀徒欲速孤立却宜遲盡力唯求已公心任遇誰人間不得意半是鬢先衰郊居寄友人林色樹還曛何時得見君獨居度永日相去逺浮雲故疾隨秋至離懐覺夜分蛩聲非自苦偏是旅人聞送陸肱歸吳興雪後江上去風光故國新清渾天氣曉緑動浪花春勸酒提壺鳥乘舟震澤人誰知滄海月取桂却來秦暮秋重過山僧院却接良宵坐眀河㡬轉流安禪逢小暑抱疾入髙秋二聨同後秋夜宿重本上人院詩静室聞𤣥理深山可白頭朝朝獻林果亦欲學獮猴送新安少府南浮雖六月風水巳秋涼日亂看江樹身飛逐楚檣後期誰可定臨别語空長逺宦須清苦幽蘭貴獨芳送人歸吳何人不歸去君去是閒人帝里求相識山家即近鄰交情吾道可離思栁條新未飲青門酒先如醉夢身送姚評事儒服従戎去須知勝事全使君開幕日天子偃戈年風雨依嵩嶺桑麻接楚田次句同前送姚郜先輩赴汝州辟新詩隨過客旋滿洛陽傳題棲雲寺立上人院是法従生有修持厯刼塵獨居巖下室長似定中身樹老風終夜山寒雪見春不知諸祖後傳印自何人三四聨同前題棲霞寺慶上人院詩黔中罷職過峽州題田使君北樓巴中初去日已遇使君留及得尋東道還陪上北樓江衝巫峽出檣過洛宫收好是従戎罷看山覺自由江上送従兄羣玉校書東遊逍遥蓬閣吏才子復詩流墳籍因窮覽江湖却縦遊眠波聽戍鼓飯浦約漁舟處處迎髙宻先應掃郡樓宛陵東峯亭與友人話别坐舉天涯目停杯語日晡修篁齊逈檻列岫限平蕪亂水通三楚歸帆掛五湖不知従此去何處是前塗華山尋隠者自入華山居闗東相見疎瓢中誰寄酒葉上我留書巢鳥寒棲盡潭泉暮凍餘長聞得藥力此說又何如末聨同後尋華陽隠者題薦福寺僧栖白上人院空門有才子得道亦吟詩内殿頻徴入孤峯久作期髙名何代比宻行㡬生持長愛喬松院清涼坐夏時游四明山劉樊二真人祠題山下孫氏居久在仙壇下全家是地仙池塘来乳洞禾黍接芝田起看青山足還傾白酒眠不知塵世事雙鬢逐流年和太學趙鴻博士歸蔡中得禄従髙第還鄉見後生田園休問主詞賦已埀名掃壁前題出開窓舊景清遥知賢太守致席日邀迎送夀昌曹明府恵人須宰邑為政貴通經却用清琴理猶嫌薄俗聽漲江時漸緑春嶠曉還青若宿嚴陵瀬誰當是客星哭賈島秦樓吟苦夜南望只悲君一宦終遐徼千山隔旅墳恨聲流蜀魄寃氣入湘雲無限風騷句時来日夜聞送薛能赴鎮徐方列土人間盛彭門屬九州山河天設險禮樂牧分憂皎日為明信清風占早秋雖同卻縠舉卻縠不封侯送鳳翔范書記西京無暑氣夏景似清秋天府来相辟髙人去自由江山通蜀國日月近神州若共將軍語河蘭地未收岐山逢陜下故人三秦一㑹面二陜兩分攜共憶黄河北相留白日西寄来書少達别後夢多迷早晚期於此看花聽鳥啼送友人陸肱往太原并州非故國君去復尋誰獫狁方為㓂嫖姚正用師戍煙来有號邊雪下無時更想經綿上應逢禁火期贈李將軍吾宗偏好武漢代將家流走馬辭中禁屯軍向渭州天心待破虜陣面許封侯却得河源水方應洗國讎送友人喻坦之任睦州歸心常共知歸路不相隨彼此無依倚東西又别離山花含雨濕江樹逆潮欹莫戀漁樵興生涯各有期尋華陽隠者閒却白雲居行蹤出去初窓中聊取筆架上獨留書日背林光冷潭澄嶽影虚長聞得藥力此說復何如末聨同前華山尋隠者長安即事豈得有書名徒為老帝京闗中秋氣早雨後夜涼生滄海身終泛青門夢已行秦人縦相識多少别離情送友人遊塞北朔野正秋風前程見磧鴻一作上馬問雲中長川送北風日西身獨逺山轉路無窮樹隔髙闗㫁沙連大漠空君看河外將早晚擬一作合平戎陜府上姚中丞闗東領藩鎮闕下授旌旄覔句秋吟苦酬恩夜坐勞天開吹角出木落上樓髙閒話錢塘郡半年一作生聽海濤送供奉喻鍊師歸天目山}
