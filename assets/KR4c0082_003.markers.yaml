  - {type: variant, offset: 67, length: 9, content: 掩然者然歷世浸乆庸, WYG: 尋秦女紅粧空覔伴郢郎白雪少知音長亭古木春先老太華青煙晩更深獨向灞陵東北望一封書寄萬重心春日思歸春情不斷若連環一夕思歸鬢欲斑壯志未酬三尺劒故鄉空隔萬重山音書斷絶干戈後親友相逢夢寐間却羨浮雲與飛鳥因風吹去又吹還朔中即事闗門南北雜戎夷草木秋來即出師落日風沙長暝早窮冬雨雪轉春遲山頭堠火孤明後星外行}
