  - {type: variant, offset: 1059, length: 1, content: 凡, WYG: 仙儻}
  - {type: variant, offset: 1061, length: 2, content: 功及, WYG: 術引我出幽岑送吳祕書歸杭州為客得従容官清料復重海涯歸有業天目近何峯是處通春棹無村不夜舂馬卿誇貴達還說返臨邛中秋對月秋分一夜停隂魄最晶熒好是生滄海徐看厯杳冥層空疑洗色萬怪想潛形他夕無相類晨雞不可聽八月上峽萬里巴江水秋來滿峽流亂山無陸路行客在孤舟洶洶灘聲急冥冥樹色愁免為三不弔巳白一生頭送狄明府赴九江字}
  - {type: page-break, offset: 1061, content: '', id: KR4c0082_WYG_001-24b, image: WYG1083/WYG1083-0052b.png}
  - {type: variant, offset: 1064, length: 10, content: 者率皆肆加爵秩以寵綏, WYG: 脩祖徳清白定聞傳匹馬従一作離秦去孤帆入楚懸闗中寒食雨湖上暑衣天四考兼重請一作重攝相知住㡬年陜下投姚諫議舊業在東鄙西遊従楚荆風雷㡬夜坐山水半年行夢永秋燈滅吟孤曉露明前心若不遂有恥却歸耕闗東逢薛能何處不相思相逢還有時交心如到老㑹面未為遲苦學縁明代勞生欲白髭唯君一度别便似見無期富春贈孫璐天柱與天目曽栖絶頂房青雲求禄晚白日坐家長井氣通潮信牕風引海涼平生詩稱一作稿在老達亦何妨送友人遊蜀東堂雖不捷西去復何愁蜀馬知歸路巴山似舊遊星臨劒閣動花落錦江流鼓吹青林下時聞祭武侯夏日盩厔郊居寄姚少府古木有清隂寒泉在下深蟬従初伏噪客向晚涼吟白日欺𤣥鬢滄江負素心二聨與前避暑首同甚思中夜話何路許相尋送胡休處士湘江見說荆湘切長愁有去時江湖秋涉達雷電一作雷雨一作風雨夜眠遲舊業多歸興空山盡老期天寒一瓢酒落日醉留誰一作擬留誰峽州送清徹上人歸浙西一作送清江上人歸東林風濤㡬千里歸路半乘舟此地難相遇一作别何人更共遊一作留坐經嵩頂夏行値洛陽秋到寺安禪夕江雲滿石樓送僧入天台一錫隨縁赴天台又去登長亭舊别路落日獨行僧夜燒山何處秋帆浪㡬層他時授巾拂莫為老無能回山後寄范酇先輩髙樓㑹月夜北鴈向南分留住經春雪辭來見夏雲遥空江不極絶頂日難曛一與山僧坐無因得議文長安送友人東歸白社思歸處青門見去人鄉遥茂苑樹路入廣陵塵海日潮浮曉湖山雪帶春猶期來帝里未是得閒人一作身深秋過源宗上人房一作方丈到日値揺落相留山舍空微寒生夜半積雨向秋終此聨同後暮秋宿清源上人院詩度講多來鴈經禪少候蟲方従聽話後不省在愁中秋日登山閣蒼蒼山閣晚杳杳隙塵秋偶上多時立翻成盡日愁草平連邑動河滿逐江流下想窮邊路行人在隴頭秋宿慈恩寺遂上人院滿閣終南色清宵獨倚攔風髙斜漢動葉下曲江寒帝里求名老空門見性難吾師無一事不似在長安題棲霞寺慶上人院居與鳥巢鄰日將巢鳥親多生従此性久集得無身樹老風終夜山寒雪見春不知諸祖後傳印自何人二聨同後贈立規上人詩人又同後題棲雲寺立上院詩送友人}
