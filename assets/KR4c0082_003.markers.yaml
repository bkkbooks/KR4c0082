  - {type: variant, offset: 1045, length: 0, content: '', WYG: 紫微三年旌斾隴雲飛塞門無事春空到邊草青青戰馬肥夏日一作秋夜宿祕書姚監宅貴宅多}
  - {type: variant, offset: 1046, length: 1, content: 泰, WYG: 樹先秋有好風一作髙樹宻濛濛開樓待曉風情閒離闕下夢野在一作到山}
  - {type: variant, offset: 1048, length: 0, content: '', WYG: 露色浮寒瓦螢光墮暗叢聽吟麗句盡河漢任西東一作轉虚空過嵩隂隠者當門看少室倚杖復披衣毎日醒還醉無人是與非架書抽讀亂庭果摘嘗稀獨有江南客思家未得歸留别山家閉門不易求半月在林邱巳與山水别難為花木留孤懐歸静夜逺㑹隔髙秋莫道無言去冥心在重遊送人遊吳楚田開雪後草色與君看積水浮春氣深山滯一作帶雨寒毗陵孤月出建業一鐘殘為把鄉書去因收别淚難東渭橋晚眺秦地有吳洲千檣渭曲頭人當返照}
  - {type: page-break, offset: 1048, content: '', id: KR4c0082_WYG_001-10a, image: WYG1083/WYG1083-0045a.png}
  - {type: page-break, offset: 1048, content: '', id: KR4c0082_WYG_001-10b, image: WYG1083/WYG1083-0045b.png}
  - {type: variant, offset: 1049, length: 1, content: 碑, WYG: 水徹故鄉流落第春難過窮途日易愁誰知橋上思萬里在江樓送延陵韋少府延陵稱貴邑季子有髙蹤古跡傳多代仙山管㡬峯微泉聲小雨異木色深冬去畢三年秩新詩篋不容淮南送人歸滄州風色忽西轉坐為千里分髙帆背楚落寒日逆淮曛斷燒縁喬木盤鵰隠片雲鄉闗百戰地歸去始休軍夏日題盩厔友人書齋脩竹齊髙樹書齋竹樹中四時無夏氣一作日三伏有秋風黒處巢幽鳥隂來呌候蟲牕西太白雪萬仞在遥空尋山一逕入雙崖初疑有㡬家行窮人不見坐久日空斜石上生靈草泉中落異花終須結茅屋向此學飡霞送元遂上人歸錢塘白衣遊帝鄉巳得事空王却返湖山寺髙禪水月房雨中過嶽黒秋後宿船凉回顧秦人語他生㑹别方貽友人喻坦之従容心自切飲水勝銜杯共在山中長相隨闕下來脩身空有道取士各無媒不信昇平代終遺草澤才送友人往振武風波遥見說道路替君愁磧夜星垂地雲明火上樓征鴻辭塞雪戰馬識邊秋不共將軍語何因有去留賦得長城斑竹杖秦興版築時剪伐不知誰異代餘根在幽人得手持細看生古意閒倚動邊思莫作鳩形並空將鶴髪期送徳清喻明府棹返霅溪雲仍參舊使君州傳多古跡縣記是新文水柵横舟閉湖田立木分但如詩思苦為政即超羣送薛能少府任盩厔不才甘下第君子蹇何重相送昆明岸同看太白峯數瓢留頃刻殘照迫従容好去煙霞縣仙人有舊蹤送許壽下第歸東山吾君設禮闈誰合學忘機却是髙人起難為下第歸出闗心縦野避世事終稀莫更令秋夕相思望少微冬夜酬范祕書一作九衢春日酬范祕書九衢行一匝不敢入他門累日無餘一作非無事通宵得至一作盡言命嗟清世蹇春覺閏冬暄飜覆吟佳句何酬國士恩送陸肱尉江夏如何執簡去便作挂帆期澤國三春早江天落日遲縣人齊候處洲鳥欲飛時免褐方三十青雲豈白髭漢上送人西歸㡬作西歸夢因為愴别心一作此日看行意令人動逺心野銜天去盡山夾一作束漢來深疊浪飜殘照髙帆引片隂空留相贈句一作惟應留别句畢我白頭吟蜀中逢友人自古有行役誰人免别家相歡猶陌上一醉任天涯積疊山藏蜀潺湲水遶巴他年復何處共說海棠花寄范評事行坐不相遺轅門載筆時雅知難更遇舊分合長思夢即重尋熟書常轉達遲山齋終擬到何日遂心期南遊過湘漢即事寄友人南去逺驅逐三湘五月行巴山雪水下楚澤火雲生向野聊中飲乘凉探莫程離懐不可說巳迫峽猿聲送許渾侍御赴潤州家山近石頭遂意恣東遊祖席離烏府歸帆轉蜃樓隂氛出海散落月向潮流别有為霖日孤雲未自由喜友人厲圗南及第相憂過已切相賀似身榮心達無前後神交共死生承家吾子事登第世人情未有通儒術明時道不行送友人下第歸越歸意隨流水江湖共在東山隂何處去草際片帆通雨色春愁裏潮聲曉夢中雖為半年客何一作便是往來鴻寄友人一别一相見須臾老此生客衣寒後薄愁思夜深清詩近吟何句髭新白㡬莖路岐如昨日來往夢分明送友人下第歸宛陵天涯長戀親闕下獨傷春擬住還求已須歸不為身臨岐仍犯雪掛席始離塵共泣東風别同為滄海人秋夜對月寄鳳翔范書記月過一作遇秋霖後光應夜夜清一迴相憶起㡬度獨吟行河漢東西直山川逺近明寸心遥往處新有鴈來聲送孫明秀才往潘州訪韋卿北鳥飛不到北人今去遊天涯浮瘴水嶺外問潘州草木春冬茂猿猱日夜愁定知遷客淚應只對君流八月十五夜對月隂盛此宵中多為雨與風坐無雲雨至看共雪霜同抱濕離遥海傾寒向迥空年年不可値還似命一作道難通及第後歸家臨浙水傍岸對買}
