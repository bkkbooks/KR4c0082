  - {type: variant, offset: 1112, length: 0, content: '', WYG: 一作如無替垂恩本有終霜天揺落日莫使逐孤一作飄蓬送姚侍御充渭北掌書記北境烽煙急南山戰伐頻撫綏初易帥參畫盡須人書記才偏稱朝廷意更親繡衣行李日綺陌别離塵報國將臨虜之藩不離秦豸冠嚴在首雄筆健隨身飲馬河聲暮休兵塞色春敗亡仍暴骨寃哭可傷神上䇿何當用邊情此是真雕隂曽久客拜送欲霑巾長安書情投知已陜服因詩句従容巳半年一従歸闕下罕得到門前毎候朝軒出常看列宿懸重投期見奬數首果䝉傳轉覺功宜倍兼令住更堅都忘春暫醉少省夜曽眠煩暑燈誰讀孤寒業自專精華搜未竭騷雅琢須全此事勤雖過他謀拙莫先槐街勞白日桂路在青天取第殊無序還鄉可有縁旅情長越鳥秋思㡬秦蟬月色千樓滿砧聲萬井連江山阻迢遞時節暗推遷道即窮通守才應始末憐書紳相戒語藏篋贈行篇致主當齊聖為郎本是仙人心期際㑹鳳翼語遷延畢竟良圗在何妨逸性便幽齋中寝覺珍木正隂圎隠几門瞻彼臨雲興𣺌然五陵供麗景六義動花牋儻與潛生翼寜非助化權免教埀素髮歸種海隅田府試丹浦非樂戰自古為君道垂衣致理難懐仁須去殺用武即勝殘毒熾誅方及兵臨釁可觀居来彭蠡固戰罷洞庭寛雪國知天逺霜林是血丹吾皇則堯典薄伐至桑乾府試風雨聞雞不為風雨變雞徳一何貞在暗長先覺臨晨即自鳴隂霾方見信頃刻詎移聲向晦如相警知時似獨清蕭蕭和㫁漏喔喔報重城欲識詩人興中含君子情府試觀蘭亭圗往㑹人何處遺蹤事可觀林亭今日在草木古春殘筆想吟中駐盃疑飲後乾向青穿峻嶺當白認回湍月影窓間夜湖光枕上寒不知詩酒客誰更慕前歡府試老人星見良宵出户庭極目向青冥海内逢康日天邊見夀星臨空遥的的竟曉獨熒熒春後先依丙秋来忽近丁垂休臨有道作瑞掩前經豈比周}
