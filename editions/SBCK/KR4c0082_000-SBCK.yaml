body:
  text: 唐建州刺史李頻德新湘口送友人鄂州頭陀寺上方􅀉逺題張司馬別墅長安即事漢上逢同年崔八五月一日蒙替本官不得随例入關感懐獻送相公春閨怨送􅁁將太和公主還宫將赴黔州先􅀉本府中丞和友人下第北遊感懷樂遊原春望黄雀行長安寓居􅀉柏侍􅀰春日思歸朔中即事感懐獻門下相公贈長城􅁃將軍浙東獻鄭大夫鏡湖夜泊有懐宣州獻從叔大夫賀同年翰林從叔舎人知制誥呉門別主人自黔中歸新安奉和鄭薫相公及第後還家過峴嶺春日旅舎過長江傷賈島自遣􅀉曹鄴述懐客洛酬劉駕題釣臺障子題陽山顧錬師草堂聞金吾妓唱梁州游蜀囬簡友人贈涇州王侍御夏日􅀫秘書姚􅁥宅過嵩隂􅀮者留別山家送人遊呉東渭橋晚眺送延陵韋少府淮南送人歸滄州夏日題盩屋友人書齋尋山送元遂上人歸錢唐貽友人喻坦之送友人徃振武賦得長城斑竹杖送徳清喻明府送薛能少府任盩厔送許壽下第歸東山冬夜酬范祕書送陸肱尉江夏漢上送人西歸蜀中逢友人􅀉范評事南遊過湘漢即事􅀉友人送許潭侍御赴潤州喜友人厲圖南及第送友人下第歸越􅀉友人送友人下第歸宛陵秋夜對月􅀉鳯翔范書記送孫明秀才徃潘州訪韋卿八月十五夜對月及第後歸過巫峽送友人徃太原旅懷送裴御史赴湖南送姚郜先輩赴汝州辟初離黔中泊江上黔中酬同院韋判官和范袐書襄陽舊逰秋夜山中思歸􅀉友人自黔中東歸旅次淮上江夏春感舊眉州別李使君送許棠及第歸宣州黔中罷職將泛江東長安書事􅀉所知酬姚覃春日鄜州贈裴居言送于生入蜀送許棠歸涇縣作尉友人話别山居􅀉范郎中書懐越中行春日南遊􅀉浙東許同年明州江亭夜别叚秀才臨岐留别相知鄂渚湖上即事辭夏口崔尚書秦原早望送友人之􅀭州過四皓廟陜下懷歸送徐處士歸江南鄜州留別王從事長安夜書懐冬夜山中㝷友送劉山人歸洞庭古意避暑送呉袐書㱕杭州中秋對月八月上峽送狄明府赴九江陜下投姚諌議􅀜東逢薛能冨春贈孫璐送友人遊蜀夏日盩厔郊居􅀉姚少府送劉山人歸洞庭送胡休處士㱕湘江峽州送清徹上人歸浙西送僧入天台回山後􅀉范酇先輩長安送友人東歸深秋過源宗上人房秋日登山閣送宋震先輩赴青州題棲霞寺上人院送友人入蜀贈同官蘇明府送厲圖南徃荆州覲伯山中夜坐送台州唐興陳明府夏日過友人檀溪別業自江上入􅀜冬夜和范祕書宿祕省中作送友人遊太原江上􅀉山容送張郎中赴睦州送鄂渚韋尚書赴鎮送崔侍御書記赴山北座主尚書招辟入朝遇雪勉力郊居􅀉友人送陸肱歸呉興暮秋重過山僧院送新安少府送人歸呉送姚評事題棲雲寺立上人院黔中罷職過峽州題田使君北樓江上送從兄群玉校書東遊宛陵東峰亭與友人話别華山㝷隠者題薦福寺僧栖白上人院㳺四明山劉樊二真人祠題山下孫氏居和太學趙鴻博士歸蔡中送壽昌曹明府哭賈島送薛䏻赴鎮徐方送􅃫翔范書記岐山逢陜下故人送友人陸肱徃太原贈李將軍送友人喻坦之㱕睦州㝷華陽隠者長安即事送友人遊塞北陜府上姚中丞送供奉喻錬師㱕天目山之任建安緑溪亭偶作二首送侯郎中任新定二首送太學呉康仁及第南歸陕州題河上亭留題姚氏山齋長安書懷投知已送姚侍御充渭北軍書記長安書情投知已府試丹浦非樂戰府試風雨聞雞府試觀蘭亭圖府試老人星見省試振鷺􅀉辛明府苑中題友人林亭投京兆府試官任文學先輩宋少府東溪泛舟聞北虜入靈州二首送友人下第歸感懷贈桂林友人長安感懷題長孫桐樹渡漢江嵩山夜還附録
