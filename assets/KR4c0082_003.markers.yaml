  - {type: variant, offset: 137, length: 2, content: 其說, WYG: 明夜誰家見應照離人隔楚江自黔中歸新安朝過春闗辭北闕暮參戎幕向南巴却將仙桂東歸去江月相隨直至一作到家奉和鄭薰相公三四株松匝草亭便成彭澤栁為名遥一作蓮峯隠去難辭闕滻水朝回與出城及第後還家過峴嶺魏䭾山前一朶一作片花嶺西更有㡬千家石斑魚鮓香衝鼻淺水沙田飯遶牙春日旅舍未識東西南北路青春白日坐銷難如}
