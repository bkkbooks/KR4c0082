  - {type: variant, offset: 1101, length: 1, content: 切, WYG: 幸分堯理蒸民悉可封送侯郎中任新定二首為郎非白頭作牧授滄洲江界乘潮入山川値勝遊暑風隨轉扇涼月傍開樓便欲歸田里抛官逐隠侯罷郎東出守半路得浮舟大斾行當夏桐江到未秋雲閒分島寺濤静}
