body:
  text: 洽百神凡在嶽瀆祀典詔加致祭建城東十五里曰棃嶽山川出雲筆立天表唐刺史李王澤民祠也雨暘靈應豊我歳功前代郡將􅁥司上其狀賜額進封廟食伯祀功徳昭昭心目至元間黄華竊發王以隂兵討逆建頼安郡憲聞省聞于朝天曆戊辰郡修祀巳已議新號命太常酌禮定典謂神著􅂕南土福芘一方爵王八字蔑以加擬應信爲惠孚封曰􅄎澤福惠忠顯孚順王一札天頒風飛雷動有光山嶽微顯闡幽盛矣謹按先志王諱頻字德新睦州壽昌人少秀悟博學善屬詞􅀹長於詩宣宗大中八年擢進士調秘書累遷武功令歳饑發廪庸民浚渠溉田穀大稔懿宗嘉之擢侍御史都官貟外􅀰表求建刺史既至以禮法治民德之及殁州爲立廟祀惟謹玄冠朱紱尊視儼然凛如生禱如響主弘吾道恵我民使建人士知禮樂風化而不知旱潦薦瘥者皆王福也祭法曰能禦大菑則祀之能捍大患則祀之􅀂王生爲民牧殁爲民福菑害不生於祀法矣法又曰有天下者祭百神諸侯在其地則􅀕之王自封命一新詔􅀕無缺諸侯之承􅀕者思今之民猶古之民今之牧亦古之牧先牧能福民今祀思我牧我民其何能淑􅀂思是則吾心神明可與對越寒泉秋菊神亦歆焉噫牧我民福民我牧祀建李潮韓孰今孰古州人請書石以示方來因作歌以遺俾祀者歌之曰棃山髙􅀆翠雲嵸文筆秀出天南峯珮環響落淩風帝錫嘉號新王宫手掣赤電飛蒼龍迹欽濁霧出日東金穰應恊玉燭豊羽霜薦潔鱗錦紅榖我福我昭神功斯民父母斯文宗逺與天地相無窮元統三年􅀊次乙未季夏良日郡進士福建漕幕佐􅁺張復撰
