  - {type: variant, offset: 1091, length: 2, content: 乏漕, WYG: 恩雖内殿得道本深山舉世相看老孤峯獨自還溪来青壁裏路在白雲間絶頂無人住雙峯是舊闗之任建安緑溪亭偶作二首入境當春務農蠶}
  - {type: variant, offset: 1094, length: 6, content: 建寧乃置司之, WYG: 正殷逢溪難飲馬度嶺更勞人想取烝黎泰無過賦斂均不知成政後誰是得為鄰維舟緑溪岸遶郡白雲峯將幕連山起人家向水重短才無獨見長䇿未相逢}
