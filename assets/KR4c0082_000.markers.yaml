  - {type: variant, offset: 0, length: 2654, content: 梨嶽詩集序梨山詩百九十五篇唐都官貟外郎建州刺史李王之所作也昔王刺此州有異政遺愛廟食梨山垂五百載大赫厥靈肇啓王封紹定間埜客過于建西山先生眞公語之曰梨山詩人也予欲刻其集未果子盍往謁之埜謝未暇後七年埜来守兹土記真公語求其詩祠下不可得乃得之京城書肆中喟然歎曰王之治建尚禮法明條教當亂世椎􅐁不敢起死又能大庇其民無水旱疫癘盗賊之菑所謂百世祀者也其遺吟舊編騷人文士之所諷詠而流傳者不藏之兹山非缺典歟於是命工鋟梓以報王之徳以成真公之志夫風雅莫盛於唐王以秀悟該洽之姿發為清逸精深之語友方干壻姚合故䏻名于當時傳之後世豈偶然哉穹山深麓之中虹光夜起則知兹詩之所在矣嘉熈三年仲春望日金華王埜謹序吾祖都官公於學靡所不通尤工於詩少監姚公一見竒之盖其詩非徒炊沙鏤氷而已可以羙教移俗有益扵人國也觀其刺建可知已近代容齋洪公紀其實于石西山眞公濳齋王公又裒其詩而抒之非其有関世教何諸公惓惓若此哉惜乎舊刻置之梨山年深而詩蕩然矣邦材睦人也學籍䴡于蘇柔兆涒灘之歲春丁前一夕假寐郡齋夢唐其衣冠者曰若知余乎余若祖李都官也余詩舊刻廟中散失無存若惡得無情哉覺而白之郡愽士咸從臾使復之遂不得辭或謂都官公胡䏻見夢扵子得母誕耶邦材應之曰柳侯死栁州他日欲廟羅池夢歐陽翼而告之昌黎豈欺我哉意者冥莫之情欲達扵人者既如此都官靈扵建舊矣見夢其孫又何誕耶板成遂志扵末峕元貞丁酉清明裔孫邦材百拜敬書詩大序曰詩者志之所之也在心為志發言為詩是則誦人之詩可不觀人之志乎李刺史晚唐時詩成晚唐體板行於世莫不嘉尚然人知其詩之可嘉而不知其志之深可嘉公之志備見扵守建之日明禮法頒教條藹然有惠政人頼以安平生之志扵斯而可見矣其生為牧其殁為神建人慕之而有梨山之祠睦人慕之而有壽昌之祠由唐而来五百餘歲而廟食如一日益信公之有徳扵人何其大人之報公之徳何其乆歟余守睦㡬一載適衢郡有頑盗出没扵壽邑間同寅議余一出而捕之及至境㓂黨就擒人悉得以無恐因而謁公之祠觀公之像而詢及公之詩或謂歲久板廢有十七世孫號愛山者曽摹舊本復鋟諸梓而未及見焉越一月愛山乃䄂新刋公詩集来訪余味公之詩知公之志而又知愛山為善継人之志者也扵是乎書峕大徳元年丁酉長至前二日壽陽齊山吕師仲書于睦之坐歗天地秀異之氣人得之為文章千古一致不生存而死亡也昌黎柳州以文鳴唐其後廟潮陽廟羅池皆此氣之不泯者梨山李王異政遺愛與詩名並傳廟食艾溪宜矣久矣然韓栁二集家有之人誦之梨山詩世不多見每以為恨今南隱方君文豹来巖翁君聖沂與予宗人大椿肖翁及王之靈仍邦材以好古博雅之心扳而新之使長留天地間是可嘉尚近得斯集快覩為之躍然夫神行萬物之上心逰宇宙之表故其為詩薄日月决雲河妙宻流動天昭海𬈑可謂無一點煙火氣愚學詩者也秋蛩寒蚓豈䏻竊觀閫奥獨甞誦工部詩云詩應有神助下筆如有神若隂祐濳相以昌其詩則不無望扵明神也歟大徳己亥仲冬吉日里人邵文龍載拜謹䟦天球河圖國之寳金石遺文家之寳神明窟宅玉牒金章又山嶽之鎮寳唐都官員外郎建州刺史李王以詩鳴以禮治廟食梨山累封王爵食五伯祀有孫㑹同由古睦壽昌謁祠下訪求典故䄂詩見予曰我先王牧建神建澤在民詩篇遺文在三舘宋嘉熈間西山文忠真先生始刋于廟夜起虹光惟封碣尚岸隂廊恐後日章殘字缺䏻不如嶧山碑今欲集刋冠卷不特寳鎮兹山抑示来者㒒亦無負斯行拜請叙復聞而起曰吾建山水千萬古閱牧如李王澤民以澤子孫者不二三歴代誥封率皆鎮寳王詩有謂知将何事酬公道只飬生靈似飬身若此法言又今日士夫之大寶後之来牧請誦斯文至元後丁丑夏沐佛日郡進士福建漕幕佐掾張復熏沐謹書棃嶽詩集目録唐建州刺史李頻德新湘口送友人鄂州頭陀寺上方寄逺題張司馬別墅長安即事漢上逢同年崔八五月一日蒙替本官不得随例入關感懐獻送相公春閨怨送邊將太和公主還宫將赴黔州先寄本府中丞和友人下第北遊感懷樂遊原春望黄雀行長安寓居寄柏侍郎春日思歸朔中即事感懐獻門下相公贈長城庾將軍浙東獻鄭大夫鏡湖夜泊有懐宣州獻從叔大夫賀同年翰林從叔舎人知制誥呉門別主人自黔中歸新安奉和鄭薫相公及第後還家過峴嶺春日旅舎過長江傷賈島自遣寄曹鄴述懐客洛酬劉駕題釣臺障子題陽山顧錬師草堂聞金吾妓唱梁州游蜀囬簡友人贈涇州王侍御夏日宿秘書姚監宅過嵩隂隱者留別山家送人遊呉東渭橋晚眺送延陵韋少府淮南送人歸滄州夏日題盩屋友人書齋尋山送元遂上人歸錢唐貽友人喻坦之送友人徃振武賦得長城斑竹杖送徳清喻明府送薛能少府任盩厔送許壽下第歸東山冬夜酬范祕書送陸肱尉江夏漢上送人西歸蜀中逢友人寄范評事南遊過湘漢即事寄友人送許潭侍御赴潤州喜友人厲圖南及第送友人下第歸越寄友人送友人下第歸宛陵秋夜對月寄鳯翔范書記送孫明秀才徃潘州訪韋卿八月十五夜對月及第後歸過巫峽送友人徃太原旅懷送裴御史赴湖南送姚郜先輩赴汝州辟初離黔中泊江上黔中酬同院韋判官和范袐書襄陽舊逰秋夜山中思歸寄友人自黔中東歸旅次淮上江夏春感舊眉州別李使君送許棠及第歸宣州黔中罷職將泛江東長安書事寄所知酬姚覃春日鄜州贈裴居言送于生入蜀送許棠歸涇縣作尉友人話别山居寄范郎中書懐越中行春日南遊寄浙東許同年明州江亭夜别叚秀才臨岐留别相知鄂渚湖上即事辭夏口崔尚書秦原早望送友人之揚州過四皓廟陜下懷歸送徐處士歸江南鄜州留別王從事長安夜書懐冬夜山中㝷友送劉山人歸洞庭古意避暑送呉袐書㱕杭州中秋對月八月上峽送狄明府赴九江陜下投姚諌議關東逢薛能冨春贈孫璐送友人遊蜀夏日盩厔郊居寄姚少府送劉山人歸洞庭送胡休處士㱕湘江峽州送清徹上人歸浙西送僧入天台回山後寄范酇先輩長安送友人東歸深秋過源宗上人房秋日登山閣送宋震先輩赴青州題棲霞寺上人院送友人入蜀贈同官蘇明府送厲圖南徃荆州覲伯山中夜坐送台州唐興陳明府夏日過友人檀溪別業自江上入關冬夜和范祕書宿祕省中作送友人遊太原江上寄山容送張郎中赴睦州送鄂渚韋尚書赴鎮送崔侍御書記赴山北座主尚書招辟入朝遇雪勉力郊居寄友人送陸肱歸呉興暮秋重過山僧院送新安少府送人歸呉送姚評事題棲雲寺立上人院黔中罷職過峽州題田使君北樓江上送從兄群玉校書東遊宛陵東峰亭與友人話别華山㝷隠者題薦福寺僧栖白上人院㳺四明山劉樊二真人祠題山下孫氏居和太學趙鴻博士歸蔡中送壽昌曹明府哭賈島送薛䏻赴鎮徐方送鳳翔范書記岐山逢陜下故人送友人陸肱徃太原贈李將軍送友人喻坦之㱕睦州㝷華陽隠者長安即事送友人遊塞北陜府上姚中丞送供奉喻錬師㱕天目山之任建安緑溪亭偶作二首送侯郎中任新定二首送太學呉康仁及第南歸陕州題河上亭留題姚氏山齋長安書懷投知已送姚侍御充渭北軍書記長安書情投知已府試丹浦非樂戰府試風雨聞雞府試觀蘭亭圖府試老人星見省試振鷺寄辛明府苑中題友人林亭投京兆府試官任文學先輩宋少府東溪泛舟聞北虜入靈州二首送友人下第歸感懷贈桂林友人長安感懷題長孫桐樹渡漢江嵩山夜還附録, WYG: ''}
