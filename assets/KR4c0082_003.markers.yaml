  - {type: variant, offset: 1075, length: 11, content: 蓋所以爲氏也臣於嘉㤗元, WYG: 蜀天際蜀門開西看舉别杯何人不異禮上客自懐才夜澗青林發秋江緑水來臨卭行樂處莫到白頭回贈同官蘇明府山中畿内邑别覺大夫清簿領分王事官資寄野情閑齋無獄訟隠几向泉聲従此朝天路門前是去程送厲圗南往荆州覲伯雲水入荆湘古來魚鳥鄉故闗重隔逺春日獨行長山溜含清瀬江雷吐夜光郡中詞客㑹遊子更升堂山中夜坐歸家來㡬夜倏忽隔秋殘月滿方塘白風依老樹寒戯魚重躍定驚鳥却棲難為有門前路吾生不得安送台州唐興陳明府見說海西隅山川與俗殊宦游如不到仙分即應無瀑布當公署天台是縣圗遥知為吏去有術字惸孤夏日過友人檀溪别業暑天宜野宅林籟爽泠泠沙月邀開户巖風助掃庭鷺栖依緑篠魚躍出清萍客抱方如醉因來得暫醒自江上入闗盡室寄滄洲孤帆獨泝流天涯心似夢江上雨兼秋文字為人棄田園被債收此名如不得何處擬將休冬夜和范祕書宿祕省中作毎入得閒吟清曹闕下深因知遥夜坐别有逺山心芸細書中氣松疎雪後隂歸時髙興足還復挿朝簪送友人遊太原孤帆㡬日懸楚客思飄然水宿南湖夜山離舊國}
