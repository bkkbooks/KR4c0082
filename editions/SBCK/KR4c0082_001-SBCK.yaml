  text: 棃嶽詩集
  hash: sha256:62f9a1ebbad74e1d752d44cb5349ab7c2bbac3457cc11d5433ffbec7801b9371
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0082_SBCK_001-1a}
body:
  text: 唐建州刺史李頻徳新湘口送友人中流欲暮見湘煙葦岸無窮接楚田去鴈逺衝雲夢澤一作雪離人獨上洞庭船風波盡日依山轉星漢通宵向水連零落梅花過殘臘故園歸醉及新年鄂州頭陀寺上方髙寺上方無不見天涯行客思迢迢西江帆過東風急夏口城衝一作衘楚塞遥沙渚漁歸多濕網桑林蚕後盡空條感時嘆物尋僧話惟向禪心得寂寥􅀉逺槐欲成隂分􅃑時君期十日復金扉槐今落葉已將盡君向逺方猶未歸化石早曽聞節婦沉湘何必獨靈妃湏知此意同生死不學他人空􅀉衣題張司馬別墅庭前樹盡手中栽先後花分幾畨去聲開巢鳥戀雛驚不起野人思酒去還來自抛官與青山近誰訝一作料身為白髪一作日催門外尋常行樂䖏重重履迹在莓苔長安即事長遇豪家不敢過此身誰與取髙科故園久絶書來後南國空㸔鴈去多中夜永懐聽疊漏先秋㱕夢涉層波愁人白髪自生早我獨少年􅀎㡬何漢上逢同年崔八去嵗曽遊帝里春杏花開過各離秦偶先托質逢知已獨未還家作旅人世上路􅄮何繚繞空中光景自逡廵一回相見一離别䏻得㡬時年少身五月一日􅂪替本官不得随例入闕感懐獻送相公五月傾朝謁􅂵宸一朝無分在清塵含香已去星郎位衣錦惟思㜈女隣折獄也曽為俗吏勸農元本是耕人知將何事酧公道只飬生􅂕似養身春閨怨紅粧兒女窓下羞畫眉夫壻隴西頭自怨愁容長照鏡悔教征戍覓封侯送􅁁將防秋戎馬恐來奔詔發將軍出鴈門遥領短兵登隴首獨横長劒向河源悠􅀭落日黄雲動莽蒼隂風白草翻􅀂縱干戈更深入應聞收得到崑崙太和公主還宫天驕發使犯􅁁塵漢將推功遂奪親離亂應無初去貌死生難有却回身禁花半老曽攀樹官女多非舊識人重上鳯樓追故事幾多愁思向青春將赴黔州先􅀉本府中丞八月瞿塘倒底翻􅀌舟上得巳銷魂幕中職罷猶趨府􅆣下官成未謝恩丹嶂聳空無過鳥青林覆水有垂猿感知肺腑終難􅀃從此辭歸便掃門和友人下第北遊感懐聖代爲儒可致身誰知又別五陵春青門獨歩空歸鳥紫陌相逢盡醉人江島去㝷垂釣逺塞山來見舉頭頻且須共漉􅁁城酒何必陶家有白綸樂逰原春望五陵佳氣晚氛氲覇業雄圖勢自分秦地山河連楚塞漢家樓殿入青雲未央樹色春中見長樂鐘聲月下聞無那楊花起愁思滿天飄落雪紛紛黄雀行欲竊高倉集御河翩翩疑渡畏秋波朱宫晚樹侵鶯語􅀞閣香􅄕奪燕窠踈葉暗棲寒露重空城飢噪暮煙多誰令不解高飛去破宅荒庭有網羅長安寓居寄柏侍郎霜輕兩􅁂欲相侵愁緒無端不可尋秦女紅粧空覓伴郢郎白雪少知音長亭古木春先老太華青煙晚更深獨向㶚陵東北望一封書􅀉萬重心春日思歸春情不斷􅀂連環一夕思歸􅁂欲斑壯志未酬三尺劒故郷空隔萬重山音書㫁絶干戈後親友相逢夢􅄰間却羡浮雲與飛鳥因風吹去又吹還朔中即事􅀜門南北雜戎夷草木秋來即出師落日風沙長暝早窮冬雨雪轉春遲山頭堠火􅀌明後星外行人四絶時自古􅁁功何不立漢家中外自相疑感懷獻門下相公誰云郎選不由詩上相憐才積有時却是龍鐘到門晚終非稽古致身遲謀將郡印歸難遂讀著家書坐欲癡日望南宫看列􅀫迢迢婺女與郷比一作鄰毗贈長城􅁃將軍初年三十拜將軍近代英雄獨未聞向國報恩心比石辭天作鎮氣凌雲逆風走馬貂裘卷望塞懸弧鴈陣分定擁節麾從此去安西大破犬戎群浙東獻鄭大夫聖主東憂漲海濵思移副相􅀝陶鈞樓臺獨坐江山月舟楫先行澤國春遥想萬家開户外近聞群盗竄諸鄰㡬時入去調元化天下同爲堯舜人鏡湖夜泊有懐東􅀳太守馬臻所築廣水遥隄利物功因思太守惠無窮自從版築興農􅂩長與耕耘致歳豊漲接星津流蕩􅃞寛浮雲岫動虚空想當戰國開時有范蠡扁舟秪此中宣州獻從叔大夫清時選地任賢明從此觀風輟尹京日月天中辭洛邑雲山江上領宣城萬家閭井俱安􅃦千里農桑竟起耕聞說聖朝同漢代已愁徴入拜公卿賀同年翰林從叔舎人知制誥仙禁何人躡近蹤孔門先選得真龍别居雲路抛三省專掌天書在九重五色毫揮成渙汗百寮班下獨從容芳年貴盛誰爲比欝欝青青嶽頂松呉門別主人早晩更看呉苑月小齋長憶落西窓不知明夜誰家見應照離人隔楚江自黔中歸新安朝過春􅀜辭北闕暮參戎幕向南巴却將仙桂東歸去江月相隨直至家奉和鄭薫相公三四株松匝草亭便成彭澤柳爲名遥峯隠去難辭闕滻水朝回與出城及第後還家過峴嶺魏䭾山前一朶花嶺西更有㡬千家石斑魚鮓香衝鼻淺水沙田飯遶牙春日旅舎未識東西南北路青春白日坐銷難如何一别故園後五度花開五處看過長江傷賈島忽從一宦逺流離無罪無人子細知到得長江聞杜字想君魂魄也相隨自遣永擬東歸把釣絲將行忽起半心疑青雲道是不平地還有平人上得時寄曹鄴終南山是枕前雲禁皷無因曉夜聞朝客秋來不朝日曲江西岸去尋君述懐望月疑無得桂縁春天又待到秋天杏花開與槐花落愁去愁來過㡬年客洛酬劉駕浮世緫應相送老共君偏更逺行多此回不似前回別聽盡離􅁔逐櫂􅁔題豹臺障子君家盡是我家山嚴子前臺枕古灣却把釣竿終不可㡬時入海得魚還題陽山頋鍊師草堂􅀂到當時上昇處長生何事後無人前峯自去種松子坐見將來取茯神聞金吾妓唱梁州聞君一曲古梁州驚起黄雲塞上愁秦女樹前花正發北風吹落滿城秋㳺蜀回簡友人別來十二月去到漏天邉不是因逢閏還應似隔年贈涇州王侍御一旦天書下紫㣲三年旌斾隴雲飛塞門無事春空到􅁁草青青戰馬肥夏日􅀫袐書姚監宅貴宅多嘉樹先秋有好風情閑離闕下夢野在山中露色浮寒瓦螢光墮暗叢聽吟麗句盡河漢任西東過嵩隂􅀮者當門看少室􅀝杖復披衣毎日醒還醉無人是與非架書抽讀亂庭果摘嘗稀獨有江南客思家未得歸留别山家閑門不易求半月在林丘已與山水別難爲花木留􅀌懐歸静夜逺㑹隔髙秋莫道無言去㝠心在重逰送人逰呉楚田開雪後草色與君看積水浮春氣深山滯􅀨寒毗陵􅀌月出建業一鐘殘為把郷書去因收別淚難東渭橋晚眺秦地有呉洲千檣渭曲頭人當返照立水徹故郷流落第春難過窮塗日易愁誰知橋上思萬里在江樓送延陵韋少府延陵稱貴邑季子有高蹤古跡傳多代仙山管㡬峯㣲泉聲小􅀨異木色深冬去畢三年秩新詩篋不容淮南送人歸滄州風色忽西轉坐爲千里分髙帆背楚落寒日逆淮曛㫁燒縁喬木盤鵰􅀮片雲郷關百戰地歸去始休軍夏日題盩厔友人書齋脩竹齊髙樹書齋竹樹中四時無夏氣一作日三伏有秋風黒處巢幽鳥隂來呌􅀱蟲物西太白雪萬仞在遥空物一作牎㝷山一逕入􅀟崖初疑有㡬家行窮人不見坐乆日空斜石上生􅂕草泉中落異花終須結茅屋向此學飡霞送元遂上人歸錢唐白衣逰帝郷已得事空王却返湖山寺高禪水月房甬中過嶽黒秋後􅀫船凉回顧秦人語他生㑹別方貽友人喻坦之從容心自切飲水勝衘杯共在山中長相隨闕下來脩身空有道取事各無媒不信昇平代終遺草澤才送友人往振武風沙遥見說道路替君愁磧夜星垂地雲明火上樓征鴻辭塞雪戰馬識􅁁秋不共將軍語何因有去留賦得長城斑竹杖秦興版築時剪伐不知誰異代餘根在幽人得手持細看生古意閑􅀝動􅁁思莫作鳩形並空將鶴髪期送德清喻明府棹返霅溪雲仍參舊使君州傳多古跡縣記是新文水柵横舟閉湖田立木分但如詩思苦爲政即超群送薛能少府任盩厔不才甘下第君子蹇何重相送昆明岸同看太白峯數瓢留頃刻殘照迫從容好去煙霞縣仙人有舊蹤送許壽下第歸東山吾君設禮闈誰合學忘機却是高人起難爲下第歸出關心縱野避世事終稀莫更令秋夕相思望少㣲冬夜酬范祕書九衢行一匝不敢入他門累日無餘事通宵得至言命嗟清世蹇春覺閏冬暄飜覆吟佳句何酬國士恩送陸肱尉江夏如何執簡去便作挂帆期澤國三春早江天落日遲縣人齊候處洲鳥欲飛時免禍方三十青雲豈白髭漢上送人西歸㡬作西歸夢因為愴別心野衘天去盡山夾漢來深疊浪飜殘照高帆引片隂空留相贈句畢我白頭吟蜀中逢友人自古有行役誰人免別家相􅂬猶陌上一醉任天涯積疊山藏蜀潺湲水遶巴他年復何處共􅀃海棠花􅀉范評事行坐不相遺轅門載筆時雅知難更遇舊分各長思夢即重㝷熟書常轉逹遲山齋終擬到何日遂心期南逰過湘漢即事􅀉友人南去逺驅逐三湘五月行巴山雪水下楚澤火雲生向野聊中飲乘凉探莫程離懐不可􅀃已迫峽猿聲送許渾侍御赴潤州家山近石頭送意恣東逰祖席離烏府歸帆轉蜃樓隂氛出海散落月向潮流別有爲霖日􅀌雲未自由喜友人厲圖南及第相憂過已切相賀似身榮心逹無前後神交共死生承家吾子事登第世人情未有通儒術明時道不行送友人下第歸越歸意隨流水江湖共在東山隂何處去草際片帆通􅀨色春愁裏潮聲曉夢中雖為半年客同是徃來鴻寄友人一別一相見須􅁷老此生客衣寒後薄愁思夜深清詩近吟何句髭新白㡬莖路岐如昨日來徃夢分明送友人下第歸宛陵天涯長戀親闕下獨傷春擬住還求已須歸不爲身臨岐仍犯雪掛席始離塵共泣東風別同爲滄海人秋夜對月􅀉鳯翔范書記月過秋霖後光應夜夜清一廻相憶起㡬度獨吟行河漢東西直山川逺近明寸心遥徃處新有鴈來聲送孫明秀才徃潘州訪韋卿北鳥飛不到北人今去逰天涯浮瘴水嶺外問潘州草木春冬茂猿猱日夜愁定知遷客淚應只對君流八月十五夜對月隂盛此宵中多為􅀨與風坐無雲􅀨至看共雪霜同抱濕離遥海傾寒向逈空年年不可值還似命一作道難通及第後歸家臨浙水傍岸對買臣郷縱棹隨歸鳥乗潮向夕陽苦吟身得雪甘意􅁂成霜况此年猶少酬知足自強過巫峽擁棹向驚湍巫峯直上看削成從水底聳出在雲端暮雨晴時少啼猿渇下難一聞神女去風竹掃空壇送友人徃太原離亭聊把酒此路徹􅁁頭草白鴈來盡時清人去遊汾河流􅀳地塞雪滿并州别有相思夜空看北斗愁一作明日相思起䔥條上北樓旅懐萬里共心論徒言吾道存奉親無別業謁帝有何門水􅀫驚濤浦山行落葉村長安長夢去欹枕即聞猿送裴御史赴湖南開門鳥道中飛傳復乘騘暮雪離秦甸春雲一作雷入楚宫平蕪天共闊積水地多空使府懸帆去能消㡬日風送姚郜先輩赴汝州辟行李事寒天東來聘禮全州當定鼎處人去偃戈年􅀨雪依嵩嶽桑麻接楚田遥知清夜作不是借戎篇初離黔中泊江上去去把青桂平生心不違更蒙蓮府辟兼脫布衣歸霽嶽明殘雪清波􅃞落暉無窮幽鳥戯時向棹前飛黔中酬同院韋判官平生同所為相遇偶然遲各着青袍後無歸白社期江流來絶域府地管諸夷聖代都無事從公且賦詩和范袐書襄陽舊逰聽話􅀭帆興初從峴首還高吟入白浪遥看出青山枯􅀣猿啼爽寒汀鶴歩閑秋来􅀜去夢㡬夜度商顔秋夜山中思歸􅀉友人蕭條對秋色相憶在雲泉木落病身起潮平歸思懸凉鍾山頂寺暝火渡頭船此地非吾土淹留又一年自黔中東歸旅次淮上行旅本同愁黔呉復阻脩半年方中路窮節到􅀌舟夕靄垂隂野晨光動積流家山一夜夢便是昔年逰江夏春感舊東風出海門處處動林園澤國雪霜少沙汀花木繁暖魚依水淺晴鴈入空飜何處陽和力生萍不駐根眉州别李使君一作眉山留獻張端公回首雪峯前朱門心杳然離人自嗚咽流水莫潺湲毒草通蛮徼秋林近漏天一生從此去五字有誰憐送許棠及第歸宣州高科終自致志業信如神待得逢公道由來合貴身秋歸方覺好舊夢始知真更想青山宅誰為後主人黔中罷職將泛江東黔荒初罷職薄俸亦無殘舉目郷關逺携家旅食難野梅將雪競江月共沙寒兩􅁂愁應白何勞把鏡看長安書事寄所知帝里本無名端居有道情睡䰟春夢短書興晚窓明老擬歸何處閑應過此生江湖終一日拜别便東行酬姚覃不見又相招何曽訴寂寥醉眠春草長吟坐夜燈銷淚墮思山切身歸轉路遥年年送別處楊柳少垂條春日鄜州贈裴居言雖將身佐幕岀入似閑居草色長相待山情信不踈燈前春睡足酒後夜寒餘筆研時時近終非署簿書送于生入蜀家呉聞入蜀道路頗乖離一第何多難都城可少知江山非久戀命数未終竒況又將􅁈抱經春杜魄隨送許棠歸涇縣作尉青桂復青袍一歸榮一髙縣人齊下拜邑宰共分曹遶郭看秧挿㝷街聽繭鏁封侯萬里者燕頷乃徒勞友人話別論交雖不早話別且相親除却棲禪客誰非南陌人半生都返性終老擬安貧願入白雲社髙眠自致身山居欲出窮吾道東西自未能捲書一作簾誰對鶴開畫一作卷獨留僧落葉和雲掃秋山共月登何年石上水夜夜滴髙層􅀉范􅀰中藜杖山中出吟詩獨范家相知從海嶠􅀉食向京華名宦成何報清眸未縱賖臨邛夢來徃􅀨雪滿褒斜書懐宦途從不問身事覺無差華髪􅀄生女滄洲未有家却閑思洞穴終老曠桑麻別訪棲禪侣相期語刼沙越中行越國臨滄海芳洲復舊晴湖通諸浦白日􅀮亂峯明野􅀫多無定閑逰免有情天台聞不逺終到石橋行春日南逰􅀉浙東許同年􅀌帆處處􅀫不問是誰家南國平蕪逺東風細􅀨斜旅懐多􅀉酒寒意欲留花更想前途去茫茫滄海涯明州江亭夜別叚秀才離亭向水開時候復蒸梅霹􅆮燈燭滅蒹葭風雨來京關誰共語海嶠不同回莫爲蓴鱸羙天涯滯爾才臨岐留別相知百歳竟何事一身長逺逰行行將近老處處不離愁世路多相取權門不自投難爲此時別欲別願人留鄂渚湖上即事杜門聊自適湖水在窓間縱得滄江去無過白日閑多慵空好道少賤蚤彫顔獨有東峯月依依自徃還辭夏口崔尚書一飯仍難受依仁况一年終期身可報不擬骨空鑴城晚風髙角江春浪起船同來棲止地獨去塞鴻前秦原早望一忝郷書薦長安未得廻年光逐渭水春色上秦臺燕掠平蕪去人衝細􅀨來東風生故里又過㡬花開送友人之􅀭州一別長安後晨征便信雞河聲入峽急地􅀔出􅀜低緑樹叢垓下青蕪濶楚西路長知不惡隨處好詩題過四皓廟東西南北人髙跡自相親天下已歸漢山中猶避秦龍樓曽作客鶴氅不爲臣獨有千年後青青廟木春陜下懐歸故園何處在零落五湖東日暮無來客天寒有去鴻大河氷徹塞高嶽雪連空獨夜懸㱕思迢迢永漏中送徐處士㱕江南行行野雲薄寒氣已通春故國入芳草滄江終白身遊㱕花落滿睡起鳥啼新莫惜閑書札西來問旅人鄜州留别王從事相識未十日相知如十年從來易離别此去忽留連路險行衝雨山髙度隔天終難清夜坐更聽說安􅁁長安書懐四馬西㳺日從呉又轉荆風雷㡬夜坐山水半年行夢永秋燈滅吟餘曉露明良時不我與白髪向頭盈冬夜山中㝷友何人山雪夜相訪不相思若得長閑日應無暫到時葉寒凋欲盡泉凍落還遲即此天明去重來未有期送劉山人歸洞庭君逐雲山去人間又絶蹤半湖乘早月中路入踈鍾秋盡草蟲急夜深山雨重平生心未已不得更相從古意白馬逰何處青樓日正長鳯簫抛舊曲鸞鏡􅂴新粧玄鳥深巢静一作玄鳥空巢語飛花入户香雖非竇滔婦錦字已成章避暑當暑憶㱕林陶家借柳隂蟬從初伏噪客向晚凉吟白日欺玄􅁂滄江􅀒素心神仙儻有術引我出幽岑送呉袐書㱕杭州爲客得從容官清料復重海涯㱕有業天目近何峯是處通春棹無村不夜春馬卿誇貴逹還􅀃返臨邛中秋對月秋分一夜停隂魄最晶熒好是生滄海徐看歷杳冥層空疑洗色萬怪想濳形他夕無相􅁼晨雞不可聽八月上峽萬里巴江水秋來滿峽流亂山無陸路行客在􅀌舟洶洶灘聲急冥冥樹色愁免為三不弔巳白一生頭送狄明府赴九江字人脩祖德清白定聞傳匹馬從秦去􅀌帆入楚懸􅀜中寒食􅀨湖㫖者衣天四考兼重請相知住㡬年陜下投姚諌議舊業在東鄙西遊從楚荆風雷㡬夜坐山水半年行夢永秋燈滅吟􅀌曉露明前心􅀂不遂有恥却㱕耕關東逢薛能何處不相思相逢還有時交心如到老㑹面未為遲苦學縁明代勞生欲白髭唯君一度别便似見無期富春贈孫璐天柱與天目曾栖絶頂房青雲求禄晚白日坐家長井氣通潮信牎風引海涼平生詩稿在老逹亦何妨送友人逰蜀東堂雖不捷西去復何愁蜀馬知歸路巴山似舊逰星臨劒閣動花落錦江流皷吹青林下時聞祭武侯夏日盩厔郊居􅀉姚少府古木有清隂寒泉在下深蟬從􅀄伏噪客向晚涼吟白日欺玄􅁂滄江􅀒素心甚思中夜話何路許相㝷送劉山人歸洞庭却共歸雲去高眠最上峯半湖乘早月中路入踈鍾秋盡草蟲急夜深山􅀨重平生心未已不得更相從送胡休處士㱕湘江見􅀃荆湘切長愁有去時江湖秋涉逺雷電夜眠遲舊業多歸興空山盡老期天寒一瓢酒落日醉留誰峽州送清徹上人歸浙西風濤㡬千里歸路半乘舟此地難相遇何人更共逰坐經嵩頂夏行值洛陽秋到寺安禪夕江雲滿石樓送僧入天台一錫隨縁赴天台又去登長亭舊別路落日獨行僧夜燒山何處秋帆浪㡬層他時授巾拂莫為老無能回山後􅀉范鄼先輩高樓㑹月夜北鴈向南分留住經春雪辭來見夏雲遥空江不極絶頂日難曛一與山僧坐無因得議文長安送友人東歸白社思歸處青門見去程郷遥茂苑樹路入廣陵塵海日潮浮曉湖山雪露春猶期來帝里未是得閑人深秋過源宗上人房到日值揺落相留山舎空微寒生夜半積雨向秋終度講多來鴈經禪少􅀱蟲方從聽話後不省在愁中秋日登山閣蒼蒼山閣晚杳杳􅂩塵秋偶上多時立翻成盡日愁草平連邑動河滿逐江流下視窮􅁁路行人在隴頭送宋震先輩赴青州滿閣終南色清宵獨􅀝欄風髙斜漢動葉下曲江寒帝里求名老空門見性難吾師無一事不似在長安題棲霞寺上人院居與鳥巢鄰日將巢鳥親多生從此性乆集得無身􅀣老風終夜山寒雪見春不知諸祖後傳印自何人送友人之蜀天際蜀門開西看舉別杯何人不異禮上客自懐才夜澗青林發秋江緑水來臨卭行樂處莫到白頭回贈同官蘇明府山中畿内邑別覺大夫清簿領分王事官資􅀉野情閑齋無獄訟􅀮几向泉聲從此朝天路門前是去程送厲圖南徃􅍮州覲伯雲水入荆湘古來魚鳥郷故關重隔逺春日獨行長山溜含清韻江雷吐夜光郡中詞客㑹逰子更升堂山中夜坐歸家來㡬夜倐忽隔秋殘月滿方塘白風依老樹寒戯魚重躍定驚鳥却棲難爲有門前路吾生不得安送台州唐興陳明府見說海西隅山川與俗殊宦㳺如不到仙分即應無瀑布當公署天台是縣圖遥知爲吏去有術字惸􅀌夏日過友人檀溪別業暑天宜野宅林籟爽泠泠沙月邀開户巖風助掃庭鷺栖依緑篠魚躍出清萍客抱方如醉因來得暫醒自江上入關盡室􅀉滄洲􅀌帆獨泝流天涯心似夢江上雨兼秋文字為人棄田園􅀍債収此名如不得何處擬將休冬夜和范袐書􅀫袐省中作毎曰得閑吟清曹闕下深因知遥夜坐別有逺山心芸細書中氣松踈雪後隂歸時高興足還復挿朝􅆪送友人逰太原􅀌帆㡬日懸楚客思飄然水􅀫南湖夜山離舊國年秋風高送鴈寒􅀨入停蟬此去勤書札時常中路傳江上􅀉山客山後與山前相思隔呌猿殘雲収樹末反照落江源苦􅀨秋清長狂風野火飜朝來賣藥客遇我無言送張􅀰中赴睦州青山復渌水想入富春西夾㟁清猿去中流白日仾羙兼華省出榮共故郷齊賤子遥攀送歸心逐馬蹄送鄂渚􅅊尚書赴鎮夏口本呉頭重城㨿上遊戈船轉江漢風月􅀫汀洲執憲傾民望衘恩赴主憂誰知舊僚属攀餞涙仍流送崔侍御書記赴山北座主尚書招辟管記向丘門旌幢夹谷尊從來遊幕意此去并酬恩鴈呌嫌氷合􅔕嘶喜雪繁同為入室士不覺別銷䰟入朝遇雪霜􅁂持霜簡朝天向雪天玉階初辨色瓊􅀣乍相鮮宻翳空難曙盈徴瑞不愆誰為洛陽客是曰更高眠勉力日月不並照升沉俱有時自媒徒欲速􅀌立却宜遲盡力唯求已公心任遇誰人間不得意半是􅁂先衰郊居􅀉友人林色􅀣還曛何時得見君獨居度永日相去逺浮雲故疾随秋至離懐覺夜分蛩聲非自苦偏是旅人聞送陸肱㱕呉興雪後江上去風光故國新清渾天氣曉緑動浪花春勸酒提壺鳥乗舟震澤人誰知滄海月取桂却来秦暮秋重過山僧院却接良宵㘴明河㡬轉流安禅逄小暑抱疾入髙秋静室聞玄理深山可白頭朝朝献林果亦􅁒學獼猴送新安少府南浮雖六月風水已秋谅日亂看江􅀣身飛逐椘檣後期誰可定臨别語空長逺䆠須清苦幽蘭貴獨芳送人歸吴何人不歸去君去是閑人帝里求相識山家即近隣交情吾道可離思栁條新未飲青門酒先如醉夢身送姚評事儒服從戎去須知勝事全使君開幕日天子偃戈年風􅀨依嵩嶺桑麻接楚田新詩隨過客旋滿洛陽傳題棲雲寺立上人院是法從生有修持歷刼塵獨居巖下室長似定中身樹老風終夜山寒雪見春不知諸祖後傳印自何人黔中罷職過峽州題田使君北樓巴中初去日已遇使君留及得尋東道還陪上北樓江衝巫峽出檣過洛宫収好是從戎罷看山覺自由江上送從兄群玉校書東逰逍遥蓬閣吏才子復詩流墳籍因窮覽江湖却縱逰眠波聽戍皷飯浦約漁舟處處迎高密先應掃郡樓宛陵東峯亭與友人話别坐舉天涯目停杯語日晡脩篁齊過檻列岫限平蕪亂水通三楚歸帆掛五湖不知從此去何處是前塗華山㝷􅀮者自入華山居􅀜東相見踈瓢中誰􅀉酒葉上我留書巢鳥寒棲盡潭泉暮凍餘長聞得藥力此􅀃又何如題薦福寺僧栖白上人院空門有才子得道亦吟詩内殿頻徴入孤峯乆作期高名何代比密行㡬生持長愛喬松院清涼坐夏時㳺四明山劉樊二真人祠題山下孫氏居乆在仙壇下全家是地仙池塘求乳洞禾􅁰接芝田起看青山足還傾白酒眠不知塵世事􅀟􅁂逐流年和太學趙鴻博士歸蔡中得禄從高第還郷見後生田園休問主詞賦已垂名掃壁前題出開窓舊景清遥知賢太守致席日邀迎送壽昌曹明府惠人須宰邑爲政貴通經却用清琴理猶嫌薄俗聽漲江時漸緑春嶠燒還青若􅀫嚴陵瀬誰當是客星哭賈島秦楼吟苦夜南望只悲君一宦終遐徼千山隔旅墳恨聲流蜀魄􅁈氣入湘雲無限風騷句時來日下聞送薛能赴鎮徐方列土人間盛彭門屬九州山河天設險禮樂牧分憂皎日為明信清風占早秋雖同郤縠舉郤縠不封侯送鳯翔范書記西京無暑氣夏景似清秋天府來相辟高人去自由江山通蜀國日月近神州􅀂共將軍語河蘭地未収岐山逢陜下故人三秦一㑹面二陜兩分携共憶黄河北相留白日西寄來書少逹別後夢多迷早晚期於此看花聽鳥啼送友人陸肱徃太原并州非故國君去復尋誰獫狁方爲㓂嫖姚正用師戌煙來自􅉑􅁁雪下無時更想經綿上應逢禁火期贈李將軍吾宗偏好武漢代將家流走馬辭中禁屯車向渭州天心待破虜陣靣許封侯却得河源水方應洗國讎送友人喻坦之歸睦州歸心常共知歸路不相隨彼此無依􅀝東西又别離山花含􅀨濕江樹近潮欹莫見漁樵興人生各有誰尋華陽􅀮者閑却白雲居行蹤出去初窓中聊取筆架上獨留書日背林光冷潭澄嶽影虚長聞得藥力此􅀃復何如長安即事豈得有書名徒爲老帝京關中秋氣早􅀨後夜涼生滄海身終泛青門夢已行秦人縱相識多少別離情送友人逰塞北朔野正秋風前程見磧鴻日西身獨逺山轉路無窮樹隔髙關㫁沙連大漠空君看河外將早晚擬平戎陜府上姚中丞關東領藩鎮闕下授旌旄覓句秋吟苦酬恩夜坐勞天開吹角出木落上樓髙閑話錢塘郡半年聽海濤送供奉喻鍊師歸天目山承恩雖内殿得道本深山舉世相看老􅀌峯獨自還溪來青壁裏路在白雲間絶頂無人徃􅀟峯是舊􅀜之任建安緑溪亭偶作二首入境當春務農􅁞事正殷逢溪難飲馬度嶺更勞人想取烝􅀺㤗無過賦歛均不知成政後誰是得為鄰維舟緑溪岸遶郡白雲峯將幕連山起人家向水重短才無獨見長䇿未相逢所幸分尭理烝民悉可封送侯􅀰中任新定二首爲􅀰非白頭作牧授滄洲江界乘潮入山川值勝逰暑風隨轉扇涼月傍門樓便欲歸田里抛官逐隠侯罷郎東出守半路得浮舟大斾行當夏桐江到未秋雲閑分島寺濤静見沙鷗誰伴臨清景吟詩上郡樓送太學呉康仁及第南㱕因爲太學選志業徹春闈首領諸生出先登上第㱕一榮猶未已具慶且應稀縱馬行青草臨岐脫白衣家遥楚國􅀉帆對漢山飛知已盈華省看君再發機陜州題河上亭岸擁洪流急亭開清興長當軒河草晩入坐水風涼獨鳥驚來客􅀌雲觸去檣秋聲和逺􅀨暮色帶㣲陽浪静澄窓影沙明發簟光逍遥毎盡日誰識愛滄浪留題姚氏山齋未厭棲林趣猶懐濟世才閑眠知道在高歩㑹時來露滳從􅄈硯蟬吟便送杯乱書離縹帙迸筍出莓苔異果因僧􅎥幽窓為燕開春逰何處盡欲別幾遲􅅆長安書懷投知已所學近雕蟲知難謁至公徒隨衆人後擬老一生中間歲家書到經荒世業空心懸滄海㫁夢與白雲通五漏聲連北銀河氣極東􅀜門迢遞月禁苑寂寥鴻地廣身難束時平道獨窮蕭條苔長雨淅瀝葉危風乆戀干朝客多慙別釣翁因依非不忝延薦況曽􅂪與善應無替垂恩本有終霜天揺落日莫使逐􅀌蓬送姚侍御充渭北掌書記北境烽煙急南山戰伐頻撫綏初易帥参畫盡須人書記才偏稱朝廷意更親繡衣行李日綺陌别離塵報國將臨虜之藩不離秦豸冠嚴在首雄筆健随身飲馬河聲暮休兵塞色春敗亡仍􅁀骨􅁈哭可傷神上䇿何當用􅁁情此是真雕隂曽乆客拜送欲霑巾長安書情投知已陜服因詩句從容巳半年一從歸闕下罕得到門前毎􅀱朝軒出常看列􅀫懸重投期見奬数首果蒙傳轉覺功宜倍兼令住更堅都忘春暫醉少省夜曽眠煩暑燈誰讀􅀌寒業自專精華搜未竭騷雅􅅣須全此事勤雖過他謀拙莫先槐街勞白日桂路在青天取第殊無序還郷可有縁旅情長越鳥秋思㡬秦蟬月色千樓滿砧聲萬井連江山阻迢遞時節暗推遷道即窮通守才應始末憐書紳相戒語藏篋贈行篇致主當齊聖為郎本是仙人心期際㑹鳯翼語遷延畢竟良圖在何妨逸性便幽齋中􅃦覺珍木正隂圎隠几閑瞻彼臨雲興􅄅然五陵供麗景六義動花牋儻與潜生翼寜非助化􅁠免教垂素髪㱕種海隅田府試丹浦非樂戰自古爲君道垂衣致理難懷仁須去殺用武即勝殘毒熾誅方及兵臨釁可觀居來彭蠡固戰罷洞庭寛雪國知天逺霜林是血丹吾皇則堯典薄伐至桑乾府試風􅀨聞雞不爲風􅀨變雞德一行貞在暗長先覺臨晨即自鳴隂霾方見信頃刻詎移聲向晦如相警知時似獨清蕭蕭和㫁漏喔喔報重城欲識詩人興中含君子情府試觀蘭亭圖徃會人何處遺蹤事可觀林亭今日在草木古春殘筆想吟中駐盃疑飲後乾向青穿峻嶺當白認回湍月影窓間夜湖光枕上寒不知詩酒客誰更慕前歡府試老人星見良宵出户庭極目向青冥海内逢康日天􅁁見壽星臨空遥的的竟曉獨熒熒春後先依景秋來忽近丁垂休臨有道作瑞掩前經豈比周王夢徒言得九齡省試振鷺有鳥生江浦霜華作羽翰君臣將比㓗朝野共相歡月影林梢下冰光水際殘飜飛時共樂飲分道皆安逈翥宣高詠群棲入静看由來鴛鷺侣濟濟列千官􅀉辛明府何處無苛政東南有子男細將朝客􅀃須是邑人諳別業空經稔歸田獨未甘目凝煙積樹心貯月明潭曉皷愁方亂春山睡正酣不任啼鳥思郷社欲桑􅁞苑中題友人林亭井邑藏嵒穴幽棲趣􅀂何春篁抽筍􅁡夏鳥雜雛多坐有清風至林無暑氣過亂書還就葉真飲不聽歌片影明紅蘚新隂映緑蘿雄文終可惜莫更弃高科投京兆府試官任文學先輩髙興每論詩非才獨見推應當明試日不比暗投時出口人皆信操心自可知􅀌單雖有託際㑹别無期取捨知由已窮通㫁在兹賤身何足數公道自難欺澤國違甘㫖漁舟積夢思長安未歸去爲􅀝鑒妍媸宋少府東溪泛舟登岸還入舟水禽驚􅀏語晚葉低衆色濕雲帶繁暑落日乘醉歸溪流復㡬許聞北虜入靈州二首河冰一夜合虜􅀐入一作滿靈州歳歳徴兵去難防塞草秋見說靈州戰沙中血未乾將軍日告急走馬向長安送友人下第歸感懐帝里春無意歸山對物華即應來日去九陌踏槐花贈桂林友人君家桂林住日伐桂枝炊何事東堂樹年年待一枝長安感懷一第知何日全家待此身空將灞陵酒酌送向東人題長孫桐樹一去龍門側千年鳯影移空餘翦圭處無復在孫枝渡漢江嶺外音書絶經年復歷春近郷情更怯不敢問來人嵩山夜還家住東臯下好采舊山􅅔自省逰泉石何曽不夜歸
