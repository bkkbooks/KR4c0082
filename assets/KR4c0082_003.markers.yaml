  - {type: variant, offset: 17, length: 0, content: '', WYG: 似養身春閨怨紅粧一作粉兒女一作女兒窓下羞畫睂夫壻隴西頭自怨愁容長照鏡悔教征戍覔封侯送邊將防秋戎馬恐來奔詔發將軍出鴈門遥領短兵登隴首獨横長劒向河源悠揚落日黄雲動莽蒼隂風白草翻若縦干戈更深入}
  - {type: variant, offset: 18, length: 5, content: 昭格血食棃, WYG: 聞收得到崑崙太和公主還宫天驕發使犯邊塵漢將推功遂奪親離亂應無初去貌死生難有却回身禁花半老曽攀樹宫女多非舊識人重上鳳樓追故事㡬多愁思向青春將赴黔州先寄本府中丞八月瞿塘倒底翻孤舟上得巳銷魂幕中職罷猶趨府闕下官成未謝恩丹嶂聳空無過鳥青林覆水有垂猿感知肺腑終難說従此辭歸便掃門和友人下第北遊感懐聖代為儒可致身誰知又别五陵春青門獨出空歸鳥紫陌相逢盡醉人江島去尋垂釣逺塞}
