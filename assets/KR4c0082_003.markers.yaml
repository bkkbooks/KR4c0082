  - {type: variant, offset: 77, length: 7, content: 續出臆見以亂其, WYG: 四絶時自古邊功何不立漢家中外自相疑感懐獻門下相公誰云郎選不由詩上相憐才積有時却是龍鍾到門晩終非稽古致身遲謀將郡印歸難遂讀著家書坐欲癡日望南宫看列宿迢迢婺女與鄉比一作鄰毗贈長城庾將軍初年三十拜將軍近代英雄獨未聞向國報恩心比石辭天作鎮氣凌雲逆風走馬貂裘巻望塞懸弧鴈陣分定擁節麾従此去安西大破土戎羣浙東獻鄭大夫聖主東憂漲海濱思移副相倚陶鈞樓臺獨坐江山月舟楫先行澤國春遥想萬家閑一作開户外近聞羣盜竄諸鄰㡬時入去調元化天下同為堯舜人鏡湖夜泊有懐東晉太守馬臻所築廣水遥隄利物功因思太守恵無窮自従版築興農隙長與耕耘致嵗豐漲接星津流蕩漾寛浮雲岫動虚空想當戰國開時有范蠡扁舟秪此中宣州獻従叔大夫清時選地任賢明従此觀風輟尹京日月天中辭洛邑雲山江上領宣城萬家閭井俱安寢千里農桑竟起耕聞說聖朝同漢代已愁徵入拜公卿賀同年翰林従叔舍人知制誥仙禁何人躡近蹤孔門先選得}
