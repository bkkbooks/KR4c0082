  - {type: variant, offset: 4, length: 6, content: 碑記詩序紹興, WYG: 落葉巳將盡君向逺方猶未歸化石早曽聞節婦沉湘何必獨靈妃須知此意同生死不學他人空寄衣題張司馬别墅庭前樹盡手中栽先後花分㡬番開巢鳥戀雛驚不起野人思酒去還來自抛官與青山近誰訝一作料身為白髮一作日催門外尋常行樂處重重履迹在莓苔長安即事長遇豪家不敢過此身誰與取髙科故園久絶書來後南國空㸔鴈去多中夜永懐聽疊漏先秋歸夢渉層波愁人白髮自生早我獨少年能㡬何漢上逢同年崔八去嵗曽遊帝里春杏花開過各離秦偶先托質逢知己獨未還家作旅人世上路岐何繚繞空中光景自逡廵一回相見一離别能得㡬時年少身}
