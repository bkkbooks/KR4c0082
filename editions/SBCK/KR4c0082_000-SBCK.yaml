front:
  text: 梨嶽詩集序梨山詩百九十五篇唐都官貟外郎建州刺史李王之􅀁作也昔王刺此州有異政遺愛廟食梨山垂五百載大赫厥靈肇啓王封紹定間埜客過于建西山先生眞公語之曰梨山詩人也予欲刻其集未果子盍往謁之埜謝未暇後七年埜来守兹土記真公語求其詩祠下不可得乃得之京城書肆中喟然歎曰王之治建尚禮法明條教當亂世椎􅐁不敢起死又􅀎大庇其民無水旱疫癘盗賊之菑所謂百世祀者也其遺吟舊編騷人文士之所諷詠而流傳者不藏之兹山非缺典歟於是命工鋟梓以報王之徳以成真公之志夫風雅莫盛於唐王以秀悟該洽之姿發為清逸精深之語友方干壻姚合故䏻名于當時傳之後世豈偶然哉穹山深麓之中虹光夜起則知兹詩之所在矣嘉熈三年仲春望日金華王埜謹序吾祖都官公於學靡􅀁不通􅀹工於詩少監姚公一見竒之盖其詩非徒炊沙鏤氷而已可以羙教移俗有益扵人􅀦也􅀚其刺建可知已近代容齋洪公紀其實于石西山眞公濳齋王公又裒其詩而抒之非其有関世教何諸公惓惓􅀂此哉惜乎舊刻置之梨山年深而詩蕩然矣􅀖材睦人也學籍䴡于蘇柔兆涒灘之􅀊春丁前一夕假􅄰郡齋夢唐其衣冠者曰􅀂知余乎余􅀂祖李都官也余詩舊刻廟中散失無存􅀂惡得無情哉覺而白之郡愽士咸從􅁷使復之遂不得辭或謂都官公胡䏻見夢扵子得母誕耶􅀖材應之曰柳侯死栁州他日欲廟羅池夢歐陽翼而告之昌黎豈欺我哉意者冥莫之情欲達扵人者既如此都官靈扵建舊矣見夢其孫又何誕耶板成遂志扵末峕元貞丁酉清明裔孫􅀖材百拜敬書詩大序曰詩者志之􅀁之也在心為志發言為詩是則誦人之詩可不􅀚人之志乎李刺史晚唐時詩成晚唐體板行於世莫不嘉尚然人知其詩之可嘉而不知其志之深可嘉公之志備見扵守建之日明禮法頒教條藹然有惠政人頼以安平生之志扵斯而可見矣其生為牧其殁為神建人慕之而有梨山之祠睦人慕之而有壽昌之祠由唐而来五百餘􅀊而廟食如一日益信公之有徳扵人何其大人之報公之徳何其乆歟余守睦㡬一載適衢郡有頑盗出没扵壽邑間同寅議余一出而捕之及至境㓂黨就擒人悉得以無恐因而謁公之祠􅀚公之像而詢及公之詩或謂􅀊久板廢有十七世孫號愛山者曽摹舊本復鋟諸梓而未及見焉越一月愛山乃䄂新刋公詩集来訪余味公之詩知公之志而又知愛山為善継人之志者也扵是乎書峕大徳元年丁酉長至前二日壽陽齊山吕師仲書于睦之坐歗天地秀異之氣人得之為文章千古一􅆀不生存而死亡也昌􅀺柳州以文鳴唐其後廟潮陽廟羅池皆此氣之不泯者梨山李王異政遺愛與詩名並傳廟食艾溪宜矣久矣然韓栁二集家有之人誦之梨山詩世不多見每以為恨今南隱方君文豹来巖翁君聖沂與予宗人大椿肖翁及王之靈仍􅀖材以好古􅀶雅之心扳而新之使長留天地間是可嘉尚近得斯集快覩為之躍然夫神行萬物之上心逰宇宙之表故其為詩薄日月决雲河妙宻流動天昭海􅈚可謂無一􅀧煙火氣愚學詩者也秋蛩寒蚓豈䏻竊觀閫奥獨甞誦工部詩云詩應有神􅂇下筆如有神􅀂隂祐濳相以昌其詩則不無望扵明神也歟大徳己亥仲冬吉日里人邵文龍載拜謹䟦天球河圖國之寳金石遺文家之寳神明窟宅玉牒金章又山嶽之鎮寳唐都官員外郎建州刺史李王以詩鳴以禮治廟食梨山累封王爵食五伯祀有孫㑹同由古睦壽昌謁祠下訪求典故䄂詩見予曰我先王牧建神建澤在民詩篇遺文在三舘宋嘉熈間西山文忠真先生始刋于廟夜起虹光惟封碣尚岸隂廊恐後日章殘字缺䏻不如嶧山碑今欲集刋冠卷不特寳鎮兹山抑示来者㒒亦無􅀒斯行拜請叙復聞而起曰吾建山水千萬古閱牧如李王澤民以澤子孫者不二三歴代誥封率皆鎮寳王詩有謂知􅀅何事酬公道只飬生靈似飬身􅀂此法言又今日士夫之大寶後之来牧請誦斯文至元後丁丑夏沐佛日郡進士福建漕幕佐􅁺張復熏沐謹書棃嶽詩集目録
