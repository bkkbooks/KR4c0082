  - {type: variant, offset: 1150, length: 546, content: 雪今春霪潦涉夏以來又缺雨澤悉請于神旋踵昭格荷神之休念無以報剡章聞奏乞加封號上可其請二年夏六月有二日加廣濟共六字謹以告詞摹刻樂石以彰神之榮以侈上之恩俾吏民奉事益䖍則神所以隂相此邦豈有終窮也哉朝散大夫直徽猷閣權發遣福建計度轉運使兼本路勸農事權安節拜手謹書于下方開禧中封王號勑朕對越百神以綏四海凡郡國之祀功利彰著必崇其爵列厚其禮文建寧府建安縣澤民廟靈佑善應廣濟王廟食一方感應如響王封之卑閱歳已多今年榖㳺登邦人欣頼思若神貺逹于朕聞爰錫命書載衍加號惟神益昭其惠以慰元元則朕之報神寧有已哉可特封靈佑善應廣濟昭惠王奉勑如牒到奉行開禧三年十一月十九日下淳祐中封王號勑韓愈曰生能澤其民死能驚􅏒禍福之以食其土可爲靈矣建寧府建安縣澤民廟靈佑福應昭惠王昔守建安適值盗攘治以禮法民遂安堵没而見神於棃嶽廟祀至今禱祈響荅賛書疊累稱謂已極而士民尤合詞以請爰加徽號爾其顧歆益大隂隲以稱庻拳拳棃无之意可特更封靈佑福應威濟信順王奉勑如牒到奉行淳祐八年十一月十二日下淳祐中立碑臣切惟國朝恤民祀褒崇顯異第爵爲王升華八字所以昭答扞民之功亦以權衡其馭世之意也不寧若是報無可報之功寵無可竉之典嚴魯經一字之重輕以寓其特書不一書之深意非天下之至神孰能與於此哉棃嶽澤民廟靈佑福應威濟信順王豊功偉績掲日掀天不特當時沾被教化去之數百載濡浹益深嘉熈間郡, WYG: 歡髙情}
