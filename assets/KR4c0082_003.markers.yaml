  - {type: variant, offset: 24, length: 41, content: 廟逮今數百年建人奉祀甚嚴前此郡將監司上其狀既賜廟號屢進封爵功德昭昭在人耳目其名氏宜, WYG: 來見舉頭頻且須共漉邊城酒何必陶家有白綸樂遊原春望五陵佳氣晩氛氲霸業雄圗勢自分秦地山河連楚塞漢家宫殿入青雲未央樹色春中見長樂鐘聲月下聞無那楊花起愁思滿天飄落雪紛紛黄雀行欲竊髙倉集御河翩翩疑渡畏秋波朱宫晩樹侵鶯語畫閣香簾奪燕窠疎葉暗棲寒露重空城飢噪暮煙多誰令不解髙飛去破宅荒庭有網羅長安寓居寄柏侍郎霜輕兩鬢欲相侵愁緒無端}
