  - {type: variant, offset: 1053, length: 0, content: '', WYG: 對鶴開畫一作巻獨留僧落葉和雲掃秋山共月登何年石上水夜夜滴髙層寄范郎中藜杖山中出吟詩獨范家相知従海嶠寄食向京華名宦成何報清眸未縦賖臨邛夢來往雨雪滿褒斜書懐宦途従不問身事覺無差華髮初生女滄洲未有家却閒思洞穴終老曠桑麻别訪棲禪侣相期語刼沙越中行越}
  - {type: page-break, offset: 1053, content: '', id: KR4c0082_WYG_001-20b, image: WYG1083/WYG1083-0050b.png}
  - {type: variant, offset: 1054, length: 0, content: '', WYG: 臨滄海芳洲復暮晴湖通諸浦白日隠亂峯明野宿多無定閑遊免有情天台聞不逺終到石橋行春日南遊寄浙東許同年孤帆處處宿不問是誰}
  - {type: variant, offset: 1055, length: 2, content: 毖祀, WYG: 南國平蕪逺東風細雨斜旅懐多寄酒寒意欲留花更想前途去茫茫滄海涯明州江亭夜别段秀才離亭向水開時候復蒸梅霹靂燈燭滅一作燭燈滅蒹葭風雨來京闗誰共語海嶠不同回莫為蓴鱸羙天涯滯爾才臨岐留别相知}
  - {type: page-break, offset: 1055, content: '', id: KR4c0082_WYG_001-21a, image: WYG1083/WYG1083-0050c.png}
  - {type: variant, offset: 1058, length: 0, content: '', WYG: 嵗竟何事一身長逺遊行行將近老處處不離愁世路多相取權門不自投難為此時别欲别願人留鄂渚湖上即事杜門聊自適湖水在牕間縦得滄江去無過白日閒多慵空好道少賤蚤彫顔獨有東峯月依依自往還辭夏口崔尚書一飯仍難受依仁況一年一作淹留已半年終期身可報不擬骨空鑴城晚風髙角江春浪起船同來一作曽同棲止地獨去塞鴻前秦一作春原早望一忝鄉書薦長安未得迴年光逐渭水春色上秦臺燕掠平蕪去人衝細雨來東風生故里又過㡬花開送友人之揚州一作送友人遊淮南一别長安後晨征便信雞河聲入峽急地勢出闗低緑樹叢垓下青蕪闊楚西路長知不惡隨處好詩題過四皓廟東西南北人髙跡自相親天下巳歸漢山中猶避秦龍樓曽作客鶴氅不為臣獨有千年後青青廟木春陜下懐歸故園何處在零落五湖東日暮無來客天寒有去鴻大河氷徹塞髙嶽雪連空獨夜懸歸思迢迢永漏中送徐處士歸江南行行野雲薄寒氣日通春故國又芳草滄江終白身遊歸花落滿睡起鳥啼新莫惜閒書札西來問旅人鄜州留别王従事相識未十日相知如十年従來易離别此去忽留連路險行衝雨山髙度隔天終難清夜坐更聽說安邊長安書懐匹馬西游日従吳又轉荆風雷㡬夜坐山水半年行夢永秋燈滅吟餘曉露明良時不我與白髮向頭盈冬夜山中尋友一作尋僧何人山雪夜相訪不相思一作夜山深雪後月下獨尋師若得長閒日應無暫到時葉寒彫欲盡泉凍落還遲即此天明去重來未有期送劉山人歸洞庭君逐雲山去人間又絶蹤一作去意無人㑹惟應道是従一作却共歸雲去髙眠最上峯半湖乘早月中路入疎鐘秋盡草一作户蟲急夜深山雨重平生心未已豈得更相従一作當時同隠者分得㡬株松古意白馬遊何處青樓日正長鳳簫抛舊曲鸞鏡懶新粧𤣥鳥深巢静一作𤣥鳥空巢語飛花入户香雖非竇滔婦錦字巳成章避暑當暑憶歸林陶家借栁隂蟬従初伏噪客向晚涼吟白日欺𤣥鬢滄江負素心二聨同後夏日盩厔郊居寄姚少府詩}
