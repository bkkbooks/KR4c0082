  - {type: variant, offset: 1113, length: 3, content: 威神顯, WYG: 夢徒言得九齡省試振鷺有鳥生江浦霜華作羽翰君臣將比潔朝野共相歡月影林梢下氷光水際殘翻飛時共樂飲分道皆安迥翥宜髙詠羣棲入静看由来鴛鷺侣濟濟列千官寄辛明府何處無苛政東南有子男細將朝客說須是邑人諳别業空經稔歸田獨未甘目凝煙積樹心貯月明潭曉鼓愁方亂春山睡正酣不任啼鳥思鄉社欲桑蠶苑中題友人林亭井邑藏嵒穴幽棲趣若何春篁抽筍宻夏鳥雜雛多坐有清風至林無暑氣過亂書還就葉真飲不聽歌片影明紅蘚新隂映緑蘿雄文終可惜莫更棄髙科投京兆府試官任文學先輩髙興毎論詩非才獨見推應當明試日不比暗投時出口人皆信操心自可知孤單雖有託際㑹别無期取捨知由已窮通㫁在兹賤身何足數公道自難欺澤國違甘㫖漁舟積夢思長安未歸去為倚鑒妍媸宋少府東溪泛舟登岸還入舟水禽驚笑語晚葉低衆色濕雲帶繁暑落日乘醉歸溪流復㡬許聞北虜入靈州二首河氷一夜合虜騎入一作滿靈州嵗嵗徴兵去難防塞草秋見說靈州戰沙中血未乾將軍日告急走馬向長安送友人下第歸感懐帝里春無意歸山對物華即應来日去九陌踏槐花贈桂林友人君家桂林住日伐桂枝炊何事東堂樹年年待一枝長安感懐一第知何日全家待此身空將灞陵酒酌送向東人題長孫桐樹一去龍門側千年鳳影移空餘翦圭處無復在孫枝渡漢江嶺外音書絶經年復厯春近鄉情更怯不敢問来人嵩山夜還家住東臯下好采舊山薇自省遊泉石何曽不夜歸暮秋宿清源上人院野客愁来日山房木落中微風生夜半積雨向秋終證道方離法安禪不住空迷途將覺路語黙見西東秋夜宿重本上人院却憶涼堂坐明河㡬度流安禪逢小暑抱疾入髙秋水國曽重講雲林半舊遊此来看月落還似道相求第二聨同前暮秋重過山僧院詩贈立規上人竹向空齋合無僧在四鄰去雲離坐石斜月到禪身樹老風終夜山寒雪見春不知諸祖後傳印是何人二聨同前栖霞寺慶上人院詩蘇州寒食日送人歸覲江城寒食下花木慘離魂㡬宿投山寺孤帆過海門缺聲潑火雨柳色禁煙村定看髙堂後斑衣滅淚痕即席送許缺之曹南省兄梅爛荷圎六月天歸帆髙背虎邱烟到時自見成行雁别處休聽滿樹蟬賣劒為賒吳市酒攜家猶借洞庭船待看春榜来江外名占蓬莱第㡬仙送羅}
