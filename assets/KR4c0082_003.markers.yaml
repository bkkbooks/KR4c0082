  - {type: variant, offset: 1117, length: 2, content: 芘佑, WYG: 作兩浙按獄著作常宰蘇州吳縣使印星車適舊遊陶潛今日在瀛洲科條盡曉三千罪囹圄應空十二州舊綬有香籠驛馬皇華無暇狎沙鷗歸来重過姑蘇郡莫忘題名在虎邱下第後屏居書懐寄張侍御刖足豈一生良工隔}
