body:
  text: 洽百神凡在嶽瀆祀典詔加致祭建城東十五里曰梨嶽山川出雲筆立天表唐刺史李王澤民祠也雨暘靈應豐我歲功前代郡將監司上其狀賜額進封廟食伯祀功德昭昭心目至元間黃華竊發王以隂兵討逆建賴安郡憲聞省聞于朝天曆戊辰郡修祀巳已議新號命太常酌禮定典謂神著靈南土福芘一方爵王八字蔑以加擬應信為惠孚封曰溥澤福惠忠顯孚順王一札天頒風飛雷動有光山嶽微顯闡幽盛矣謹按先志王諱頻字德新睦州壽昌人少秀悟博學善屬詞尤長於詩宣宗大中八年擢進士調祕書纍遷武功令歲飢發廪庸民浚渠溉田穀大稔懿宗嘉之擢侍御史都官貟外郎表求建刺史既至以禮法治民德之及殁州為立廟祀惟謹玄冠朱紱尊視儼然凛如生禱如響主弘吾道惠我民使建人士知禮樂風化而不知旱潦薦瘥者皆王福也祭法曰能禦大災則祀之能捍大患則祀之若王生為民牧殁為民福災害不生於祀法矣法又曰有天下者祭百神諸侯在其地則祭之王自封命一新詔祭無缺諸侯之承祭者思今之民猶古之民今之牧亦古之牧先牧能福民今祀思我牧我民其何能淑若思是則吾心神明可與對越寒泉秋菊神亦歆焉噫牧我民福民我牧祀建李潮韓孰今孰古州人請書石以示方來因作歌以遺俾祀者歌之曰梨山髙兮翠雲嵸文筆秀出天南峯珮環響落淩風帝錫嘉號新王宫手掣赤電飛蒼龍迹欽濁霧出日東金穰應協玉燭豐羽霜薦潔鱗錦紅榖我福我昭神功斯民父母斯文宗逺與天地相無窮元統三年歲次乙未季夏良日郡進士福建漕幕佐掾張復撰
