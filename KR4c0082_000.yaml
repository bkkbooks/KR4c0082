front:
  text: 梨嶽詩集序梨山詩百九十五篇唐都官貟外郎建州刺史李王之所作也昔王刺此州有異政遺愛廟食梨山垂五百載大赫厥靈肇啓王封紹定間野客過于建西山先生真公語之曰梨山詩人也豫欲刻其集未果子盍往謁之野謝未暇後七年野來守兹土記真公語求其詩祠下不可得乃得之京城書肆中喟然歎曰王之治建尚禮法明條教當亂世椎􅐁不敢起死又能大庇其民無水旱疫癘盜賊之菑所謂百世祀者也其遺吟舊編騷人文士之所諷詠而流傳者不藏之兹山非缺典歟於是命工鋟梓以報王之德以成真公之志夫風雅莫盛於唐王以秀悟該洽之姿發為清逸精深之語友方干壻姚合故䏻名于當時傳之後世豈偶然哉穹山深麓之中虹光夜起則知兹詩之所在矣嘉熙三年仲春望日金華王野謹序吾祖都官公於學靡所不通尤工於詩少監姚公一見竒之蓋其詩非徒炊沙鏤氷而已可以美教移俗有益于人國也觀其刺建可知已近代容齊洪公紀其實于石西山真公濳齊王公又裒其詩而抒之非其有關世教何諸公惓惓若此哉惜乎舊刻置之梨山年深而詩蕩然矣邦材睦人也學籍麗于蘇柔兆涒灘之歲春丁前一夕假寐郡齊夢唐其衣冠者曰若知余乎余若祖李都官也余詩舊刻廟中散失無存若惡得無情哉覺而白之郡博士咸從臾使復之遂不得辭或謂都官公胡䏻見夢于子得母誕耶邦材應之曰柳侯死栁州他日欲廟羅池夢歐陽翼而告之昌黎豈欺我哉意者冥莫之情欲達于人者既如此都官靈于建舊矣見夢其孫又何誕耶板成遂志于末峕元貞丁酉清明裔孫邦材百拜敬書詩大序曰詩者志之所之也在心為志發言為詩是則誦人之詩可不觀人之志乎李刺史晚唐時詩成晚唐體板行於世莫不嘉尚然人知其詩之可嘉而不知其志之深可嘉公之志備見于守建之日明禮法頒教條藹然有惠政人賴以安平生之志于斯而可見矣其生為牧其殁為神建人慕之而有梨山之祠睦人慕之而有壽昌之祠由唐而來五百餘歲而廟食如一日益信公之有德于人何其大人之報公之德何其久歟余守睦幾一載適衢郡有頑盜出沒于壽邑間同寅議余一出而捕之及至境寇黨就擒人悉得以無恐因而謁公之祠觀公之像而詢及公之詩或謂歲久板廢有十七世孫號愛山者曽摹舊本復鋟諸梓而未及見焉越一月愛山乃䄂新刋公詩集來訪余味公之詩知公之志而又知愛山為善繼人之志者也于是乎書峕大德元年丁酉長至前二日壽陽齊山吕師仲書于睦之坐嘯天地秀異之氣人得之為文章千古一致不生存而死亡也昌黎柳州以文鳴唐其後廟潮陽廟羅池皆此氣之不泯者梨山李王異政遺愛與詩名並傳廟食艾溪宜矣久矣然韓栁二集家有之人誦之梨山詩世不多見每以為恨今南隱方君文豹來巖翁君聖沂與豫宗人大椿肖翁及王之靈仍邦材以好古博雅之心扳而新之使長留天地間是可嘉尚近得斯集快覩為之躍然夫神行萬物之上心逰宇宙之表故其為詩薄日月决雲河妙密流動天昭海𬈑可謂無一點煙火氣愚學詩者也秋蛩寒蚓豈䏻竊觀閫奧獨嘗誦工部詩云詩應有神助下筆如有神若隂祐濳相以昌其詩則不無望于明神也歟大德己亥仲冬吉日里人邵文龍載拜謹跋天球河圖國之寶金石遺文家之寶神明窟宅玉牒金章又山嶽之鎮寶唐都官員外郎建州刺史李王以詩鳴以禮治廟食梨山纍封王爵食五伯祀有孫㑹同由古睦壽昌謁祠下訪求典故䄂詩見豫曰我先王牧建神建澤在民詩篇遺文在三館宋嘉熙間西山文忠真先生始刋于廟夜起虹光惟封碣尚岸隂廊恐後日章殘字缺䏻不如嶧山碑今欲集刋冠卷不特寶鎮兹山抑示來者㒒亦無負斯行拜請叙復聞而起曰吾建山水千萬古閲牧如李王澤民以澤子孫者不二三歷代誥封率皆鎮寶王詩有謂知將何事酬公道只飬生靈似飬身若此法言又今日士夫之大寶後之來牧請誦斯文至元後丁丑夏沐佛日郡進士福建漕幕佐掾張復熏沐謹書梨嶽詩集目録
