  - {type: variant, offset: 140, length: 14, content: 據其然謹按文藝傳李頻字德新睦, WYG: 一别故園後五度花開五處看過長江傷賈島忽従一宦逺流離無罪無人子細知到得長江聞杜宇想君魂魄也相隨自遣永擬東歸把釣絲將行忽起半心疑青雲道是不平地還有平人上得時寄曹鄴終南山是枕前雲禁鼓無因曉夜聞朝客秋來不朝日曲江西岸去尋君述懐望月疑無得桂縁春天又待到秋天杏花開與槐花落愁去愁來過㡬年客洛酬劉駕浮世總應相送老共君偏更逺行多此回不似前回别聽盡離歌逐櫂歌題釣臺障子君家盡是我家山嚴子前臺枕古灣却把釣竿終不可㡬時入海得魚還題陽山顧鍊師草堂若到當時上昇處長生何事後無人前峯自去種松子坐見將一作年來取茯神聞金吾妓唱梁}
