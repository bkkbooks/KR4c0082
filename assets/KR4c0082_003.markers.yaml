  - {type: variant, offset: 16, length: 0, content: '', WYG: 五月傾朝謁紫宸一朝無分在清塵含香巳去星郎位衣錦惟思婺女隣折獄也曽為俗吏勸農元本是耕人知將何事酧公道只養生}
