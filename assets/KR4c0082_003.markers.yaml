  - {type: variant, offset: 1051, length: 1, content: 仰, WYG: 鄉縦棹隨歸鳥乘潮向夕陽苦吟身得雪甘意鬢成霜况此年猶少酬知足自強過巫峽擁棹向驚湍巫峯直上看削成従水底一作地底聳出在雲端暮雨晴時少一作晴歸少啼猿渇下難一聞神女去風竹掃空壇送友人往太原離亭聊把酒此路徹邊頭草白鴈來盡時清人去遊汾河流晉地塞雪滿并州别有相思夜空一作遥看北斗愁一作明日相思起蕭條上北樓旅懐萬里共心論徒言吾道存奉親無别業謁帝有何門水宿驚濤浦山行落葉村長安長夢去欹枕即聞猿送裴御史赴湖南開一作闗門鳥道中飛傳復乘驄暮雪離秦甸春雲一作雷入楚宫平蕪天共闊積水地多空使府懸帆去一作待能消㡬日風送姚郜先輩赴汝州辟行李事寒天東來聘禮全州當定鼎處人去偃戈年雨雪一作風雨一作雷雨依嵩嶽桑麻接楚田遥知清夜作不是借戎篇初離黔中泊江上去去把青挂平生心不違更蒙蓮府辟兼脫布衣歸霽嶽一作碧岫明殘雪清波漾落暉無窮幽鳥戯一作興時向一作日起棹前飛黔中酬同院韋判官平生同所為相遇偶然遲各着青袍後無歸白社期江流來絶域府地管諸夷聖代都無事従公且賦詩和范祕書襄陽舊遊聽話揚帆興初従峴首還髙吟入白浪遥看出青山枯樹一作古木猿啼爽寒汀鶴步一作立閑秋來闗一作南去夢㡬夜度商顔秋夜山中思歸寄友人蕭條對秋色相憶在雲泉木落病身起潮平歸思懸凉鐘山頂寺暝火渡頭船此地非吾土淹留又一年自黔中東歸旅次淮上行旅本同愁黔吳復阻脩半年方中路窮節到孤舟夕靄垂隂野晨光動積流家山一夜夢便是昔年遊江夏春感舊東風出海門處處動林園澤國雪霜少沙汀花木繁暖魚依水淺晴鴈入空飜何處陽和力生萍不駐根睂州别李使君一作眉山留獻張端公回首雪峯前朱門心杳然離人自嗚咽流水莫潺湲毒草通蠻徼秋林近漏天一生從此去五字有誰憐送許棠及第歸宣州髙科終自致志業信如神待得逢公道由來合貴身秋歸方覺好舊夢始知真更想青山宅誰為後主人黔中罷職將泛江東黔荒一作中初罷職薄俸亦無殘舉目鄉闗逺攜家旅食難野梅將雪競江月共沙寒兩鬢愁應白何勞一作勞心把鏡看長安書事寄所知帝里本無名端居有道情睡魂春夢短一作斷書興晚牕明老擬歸何處閒應過此生江湖終一日拜别便東行酬姚覃不見又相招何曽訴寂寥醉眠春草長吟坐夜燈銷涙墮思山切身歸轉路遥年年送别處楊栁少垂條春日鄜州贈裴居言雖將身佐幕出入似閒居草色長相待山情信不疎燈前春睡足酒後夜寒餘筆研時時近終非署簿書送于生入蜀家吳聞入蜀道路頗乖離一第何多難都城可少知江山非久適命數未終竒況又將寃抱經春杜魄隨送許棠歸涇縣作尉青桂復青袍一歸榮一髙縣人齊下拜邑宰共分曹遶郭看秧挿尋街聽繭繅封侯萬里者燕頷乃徒勞友人話别論交雖不早話别且相親除却棲禪客誰非南陌人半生都返性終老擬安貧願入白雲社髙眠自致身山居欲出窮吾道東西自未能捲書一作簾}
